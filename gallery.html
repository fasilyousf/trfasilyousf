<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Tr Fasil Yousf | UCC Handwara</title>
    <link rel="shortcut icon" href="./images/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .footer-h4-underline::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 50px;
            height: 2px;
            background-color: #f1c40f;
        }
        .nav-menu.active { display: flex !important; }

        .gallery-card {
            overflow: hidden;
            position: relative;
            height: 500px; /* Increased height for 2-image layout */
            border: 8px solid #fff;
            border-radius: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .gallery-card:hover {
            border-color: #f1c40f;
            transform: scale(1.02);
        }

        .gallery-card img {
            transition: transform 0.8s ease;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-overlay {
            position: absolute;
            inset: 0;
            background: rgba(44, 62, 80, 0.4);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
        }

        .gallery-card:hover .gallery-overlay {
            opacity: 1;
        }

        #lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            padding: 2rem;
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 antialiased font-sans">

    <header class="bg-[#2c3e50] text-white sticky top-0 z-50 px-[6%] py-4 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="logo text-2xl font-bold">Tr <span class="text-[#f1c40f]">Fasil Yousf</span></div>
            <nav>
                <ul class="nav-menu hidden md:flex md:flex-row items-center gap-8 absolute md:static top-[65px] left-0 w-full md:w-auto bg-[#2c3e50] p-6 md:p-0 flex-col text-center" id="nav-menu">
                    <li><a href="index.html" class="hover:text-[#f1c40f] transition duration-300">Home</a></li>
                    <li><a href="courses.html" class="hover:text-[#f1c40f] transition duration-300">Courses</a></li>
                    <li><a href="notes.html" class="hover:text-[#f1c40f] transition duration-300">Notes</a></li>
                    <li><a href="gallery.html" class="text-[#f1c40f] border-b-2 border-[#f1c40f] pb-1">Gallery</a></li>
                    <li><a href="about.html" class="hover:text-[#f1c40f] transition duration-300">About</a></li>
                    <li><a href="contact.html" class="hover:text-[#f1c40f] transition duration-300">Contact</a></li>
                </ul>
                <button class="md:hidden flex flex-col gap-1" id="hamburger">
                    <span class="w-6 h-0.5 bg-white"></span>
                    <span class="w-6 h-0.5 bg-white"></span>
                    <span class="w-6 h-0.5 bg-white"></span>
                </button>
            </nav>
        </div>
    </header>

    <section class="bg-[#34495e] py-16 px-[6%] text-center text-white relative">
        <div class="absolute inset-0 bg-black opacity-30"></div> 
        <div class="relative z-10">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-4 uppercase tracking-widest">Featured Moments</h1>
            <div class="w-20 h-1 bg-[#f1c40f] mx-auto mb-6"></div>
        </div>
    </section>

    <main class="py-16 px-[6%] max-w-7xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            
            <div class="gallery-card group">
                <img src="./images/Gallery/boys.jpeg" alt="Boys Lab Session">
                <div class="gallery-overlay">
                    <h3 class="text-white text-2xl font-bold">Computer Lab (Boys)</h3>
                    <button onclick="openLightbox('./images/Gallery/boys.jpeg', 'Our Modern Computer Lab - Boys Section')" 
                            class="bg-[#f1c40f] text-[#2c3e50] px-8 py-3 rounded-full font-bold uppercase tracking-wide hover:bg-white transition-all shadow-xl">
                        <i class="fas fa-expand-alt mr-2"></i> View Full Image
                    </button>
                </div>
            </div>

            <div class="gallery-card group">
                <img src="./images/Gallery/girls.jpeg" alt="Girls Learning">
                <div class="gallery-overlay">
                    <h3 class="text-white text-2xl font-bold">Skill Development (Girls)</h3>
                    <button onclick="openLightbox('./images/Gallery/girls.jpeg', 'Coding & Skill Workshop - Girls Section')" 
                            class="bg-[#f1c40f] text-[#2c3e50] px-8 py-3 rounded-full font-bold uppercase tracking-wide hover:bg-white transition-all shadow-xl">
                        <i class="fas fa-expand-alt mr-2"></i> View Full Image
                    </button>
                </div>
            </div>
            
        </div>

        <div class="mt-20 text-center">
            <p class="text-gray-400 italic">More highlights coming soon to our digital gallery.</p>
        </div>
    </main>

    <div id="lightbox" onclick="closeLightbox()">
        <button class="absolute top-10 right-10 text-white text-5xl hover:text-[#f1c40f] transition-transform hover:scale-110">&times;</button>
        <div class="max-w-5xl w-full text-center p-4" onclick="event.stopPropagation()">
            <img id="lightbox-img" src="" class="max-h-[80vh] mx-auto rounded-2xl shadow-2xl border-4 border-white/10">
            <p id="lightbox-caption" class="text-white text-2xl mt-8 font-bold tracking-tight"></p>
        </div>
    </div>

    <footer class="bg-[#1e2b38] text-gray-400 py-12 px-[6%] border-t-4 border-[#f1c40f]">
        <div class="text-center mt-12 pt-8 border-t border-gray-700 text-xs tracking-widest uppercase">
            <p>© 2026 FASILYOUSF INSTITUTE | TR.FASILYOUSF.ONLINE</p>
        </div>
    </footer>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('nav-menu');
        hamburger.addEventListener('click', () => navMenu.classList.toggle('active'));

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxCaption = document.getElementById('lightbox-caption');

        function openLightbox(src, caption) {
            lightboxImg.src = src;
            lightboxCaption.innerText = caption;
            lightbox.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
