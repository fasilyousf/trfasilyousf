<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UCC Handwara | Exam Portal 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #3b82f6;
            --accent: #f1c40f;
        }
        html, body { 
            height: 100%; 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #e0e7ff, #f1f5f9, #dee2ff);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .option-card {
            transition: all 0.2s ease;
            border: 2px solid transparent;
            background: white;
            display: flex;
            align-items: center;
        }
        
        .option-card:hover {
            border-color: var(--secondary);
            background: #f8fafc;
        }
        
        .option-card.selected {
            border-color: var(--primary);
            background: #eff6ff;
            box-shadow: inset 0 0 0 1px var(--primary);
        }

        .progress-bar-fill {
            transition: width 0.5s ease-in-out;
            background: linear-gradient(90deg, #1e3a8a, #3b82f6);
        }

        /* FIX: Use dvh (dynamic viewport height) for mobile browsers */
        .exam-container { 
            height: 100vh; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
        }

        .scrollable-content { 
            flex: 1; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column;
            padding-bottom: 20px;
        }

        .btn-disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
        
        @media (max-height: 700px) {
            .question-text { font-size: 1.1rem !important; margin-bottom: 1rem !important; }
            .option-card { padding: 0.75rem !important; }
        }
    </style>
</head>

<body class="text-slate-900">

    <div id="app" class="exam-container">

        <header class="glass-panel border-b p-3 flex items-center justify-between shrink-0 z-50">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 md:w-10 md:h-10 bg-blue-900 rounded-lg flex items-center justify-center text-white shadow-lg overflow-hidden">
                    <img src="./logo.jpeg" alt="UCC" onerror="this.parentElement.innerHTML='UCC'">
                </div>
                <div>
                    <h1 class="text-xs md:text-base font-extrabold text-blue-900 leading-none uppercase tracking-tight">UCC Handwara</h1>
                    <div class="flex items-center space-x-2 mt-1">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                        <p class="text-[8px] font-bold text-blue-600 uppercase">Live Exam Portal</p>
                    </div>
                </div>
            </div>
            <div id="portal-status" class="px-3 py-1 bg-slate-100 text-slate-600 text-[9px] font-black rounded-full border border-slate-200 uppercase">System Locked</div>
        </header>

        <div id="progress-container" class="hidden w-full h-1 bg-slate-200 shrink-0">
            <div id="progress-fill" class="progress-bar-fill h-full w-0"></div>
        </div>

        <div id="exam-access-screen" class="flex-grow flex items-center justify-center p-4 overflow-y-auto">
            <div class="glass-panel p-6 md:p-10 rounded-[2rem] w-full max-w-md animate__animated animate__fadeInUp">
                <div class="text-center mb-6">
                    <h2 class="text-xl font-extrabold text-slate-900 uppercase tracking-tight">Portal Access</h2>
                    <p class="text-slate-500 text-[10px] font-semibold mt-1">Admin verification required</p>
                </div>
                <div class="space-y-3">
                    <input type="text" id="accessUser" placeholder="ADMIN USER ID" class="w-full p-3.5 bg-white border border-slate-200 rounded-xl outline-none font-bold text-sm focus:ring-2 ring-blue-500">
                    <input type="password" id="accessPass" placeholder="PASSWORD" class="w-full p-3.5 bg-white border border-slate-200 rounded-xl outline-none font-bold text-sm focus:ring-2 ring-blue-500">
                    <button onclick="handleExamAccess()" class="w-full bg-blue-900 text-white py-3.5 rounded-xl font-bold uppercase text-xs tracking-widest shadow-lg hover:bg-blue-800 active:scale-95 transition-all">Unlock System</button>
                </div>
            </div>
        </div>

        <div id="login-screen" class="hidden flex-grow flex items-center justify-center p-4 overflow-y-auto">
            <div class="glass-panel p-8 rounded-[2rem] w-full max-w-md animate__animated animate__zoomIn text-center">
                <div id="verification-msg" class="hidden mb-4 p-2 bg-green-100 text-green-700 rounded-lg text-[10px] font-black uppercase">
                    Details Verified Successfully
                </div>
                <div class="mb-6">
                    <h2 class="text-2xl font-extrabold text-blue-900 uppercase">Verification</h2>
                    <p class="text-slate-500 text-[10px] font-bold">Enter Enrollment ID</p>
                </div>
                <div class="space-y-4">
                    <input type="text" id="stuRoll" value="UCC / HD / 26 / BCC" class="w-full p-4 bg-white border-2 border-blue-50 rounded-xl text-center text-lg font-extrabold text-blue-900 uppercase outline-none shadow-sm">
                    <button onclick="handleLogin()" class="w-full bg-blue-900 text-white py-4 rounded-xl font-bold uppercase text-xs tracking-widest shadow-xl hover:bg-blue-800 transition-all">Verify & Proceed</button>
                </div>
            </div>
        </div>

        <div id="dashboard-screen" class="hidden flex-grow flex items-center justify-center p-4 overflow-y-auto">
            <div class="glass-panel p-8 md:p-10 rounded-[2.5rem] w-full max-w-lg text-center border-t-4 border-blue-900 shadow-2xl">
                <h2 class="text-2xl md:text-3xl font-extrabold text-slate-900 uppercase tracking-tight" id="user-display"></h2>
                <p class="text-slate-500 text-sm font-semibold mt-1">Parentage: <span id="parent-display"></span></p>
                <div class="mt-8 grid grid-cols-2 gap-3 text-left">
                    <div class="p-3 bg-white/50 rounded-xl border border-slate-100">
                        <p class="text-[8px] font-bold text-slate-400 uppercase">Questions</p>
                        <p class="text-base font-extrabold text-blue-900">25 MCQs</p>
                    </div>
                    <div class="p-3 bg-white/50 rounded-xl border border-slate-100">
                        <p class="text-[8px] font-bold text-slate-400 uppercase">Duration</p>
                        <p class="text-base font-extrabold text-blue-900">20 Mins</p>
                    </div>
                </div>
                <button onclick="startExam()" class="w-full bg-blue-900 text-white py-4 rounded-xl font-extrabold text-lg mt-8 uppercase shadow-xl hover:bg-blue-800 transition-all">Start Exam</button>
            </div>
        </div>

        <div id="exam-screen" class="hidden h-full flex flex-col bg-slate-50/30">
            <div class="bg-blue-900 px-4 py-2 flex justify-between items-center shrink-0 text-white shadow-md">
                <div class="px-2 py-1 bg-white/10 rounded flex flex-col items-center">
                    <span class="text-[7px] font-bold uppercase opacity-70">Time</span>
                    <p id="timer" class="text-lg font-extrabold font-mono text-accent">20:00</p>
                </div>
                <div class="text-right flex flex-col items-end">
                    <p id="progress-text" class="text-lg font-extrabold font-mono">01/25</p>
                    <span class="text-[7px] font-bold uppercase opacity-70">Progress</span>
                </div>
            </div>
            
            <div class="scrollable-content px-4 py-4">
                <div id="question-area" class="max-w-2xl mx-auto w-full"></div>
            </div>

            <div class="glass-panel p-3 md:p-4 border-t flex justify-between items-center gap-3 shrink-0 mb-safe">
                <button id="prevBtn" onclick="navigate(-1)" class="flex-1 py-3 bg-slate-100 border border-slate-200 rounded-xl font-bold uppercase text-[10px] tracking-widest active:bg-slate-200">Previous</button>
                <div id="submit-container" class="hidden flex-[1.5]">
                    <button onclick="finalSubmit()" class="w-full py-3 bg-red-600 text-white rounded-xl font-extrabold uppercase text-[10px] tracking-widest animate__animated animate__pulse animate__infinite">Submit Paper</button>
                </div>
                <button id="nextBtn" onclick="navigate(1)" class="flex-1 py-3 bg-blue-900 text-white rounded-xl font-bold uppercase text-[10px] tracking-widest active:bg-blue-800">Next</button>
            </div>
        </div>

        <div id="result-screen" class="hidden flex-grow flex items-center justify-center p-4">
            <div class="glass-panel p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center border-b-8 border-green-500">
                <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                </div>
                <h2 class="text-xl font-extrabold text-slate-900 uppercase">Submitted</h2>
                <p class="text-slate-500 text-xs mt-1 mb-6 font-semibold" id="res-student-info"></p>
                <button onclick="location.reload()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold uppercase text-xs tracking-widest hover:bg-black transition-all">Exit Portal</button>
            </div>
        </div>
    </div>

    <script>
        (function(){ emailjs.init("BZ2E5BMbDJgulIhEo"); })();

        const accessRegistry = { "TRYING": "PASSWORD", "EXAMCELL": "ucc2026", "DIRECTOR": "handwara123" };
        const studentRegistry = {
            "UCC/HD/26/BCC100": { name: "Fasil Yousf", parent: "Mohammad Yousf Dar" },
            "UCC/HD/26/BCC101": { name: "Insha Gul", parent: "Gh Mohd Wani" }
        };
        const masterBank = [
            { q: "What is a computer?", a: ["Electronic machine", "Mechanical tool", "Calculator only", "Storage device"], c: "Electronic machine" },
            { q: "Which is not a type of computer?", a: ["Desktop", "Laptop", "Tablet", "Scanner"], c: "Scanner" },
            { q: "Which device is used to display output?", a: ["Keyboard", "Mouse", "Monitor", "Scanner"], c: "Monitor" },
            { q: "Which is an input device?", a: ["Printer", "Speaker", "Keyboard", "Monitor"], c: "Keyboard" },
            { q: "CPU is known as?", a: ["Brain of computer", "Memory unit", "Input unit", "Output unit"], c: "Brain of computer" },
        ];

        let selectedQuestions = [], currentIdx = 0, answers = {}, currentStudent = null, timerInterval;

        function updateProgressBar() {
            const progress = ((currentIdx + 1) / selectedQuestions.length) * 100;
            const fill = document.getElementById('progress-fill');
            if(fill) fill.style.width = `${progress}%`;
        }

        function handleExamAccess() {
            const user = document.getElementById('accessUser').value.trim();
            const pass = document.getElementById('accessPass').value.trim();
            if (accessRegistry[user] === pass) {
                document.getElementById('exam-access-screen').classList.add('hidden');
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('portal-status').innerText = "System Unlocked";
                document.getElementById('portal-status').className = "px-3 py-1 bg-green-100 text-green-700 text-[9px] font-black rounded-full uppercase border border-green-200";
            } else { alert("Access Denied."); }
        }

        function handleLogin() {
            let raw = document.getElementById('stuRoll').value.trim();
            let clean = raw.replace(/[\s/]+/g, '').toUpperCase();
            let key = Object.keys(studentRegistry).find(k => k.replace(/[\s/]+/g, '').toUpperCase() === clean);
            
            if (key) {
                document.getElementById('verification-msg').classList.remove('hidden');
                currentStudent = studentRegistry[key]; 
                currentStudent.roll = key;
                document.getElementById('user-display').innerText = currentStudent.name;
                document.getElementById('parent-display').innerText = currentStudent.parent;
                setTimeout(() => {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('dashboard-screen').classList.remove('hidden');
                }, 1000);
            } else { alert("Invalid Enrollment ID."); }
        }

        function startExam() {
            selectedQuestions = [...masterBank].sort(() => 0.5 - Math.random()).slice(0, 25);
            document.getElementById('dashboard-screen').classList.add('hidden');
            document.getElementById('progress-container').classList.remove('hidden');
            document.getElementById('exam-screen').classList.remove('hidden');
            renderCurrentQuestion(); startTimer(20);
        }

        function renderCurrentQuestion() {
            const q = selectedQuestions[currentIdx];
            const total = selectedQuestions.length;
            document.getElementById('progress-text').innerText = `${currentIdx + 1}/${total}`;
            updateProgressBar();

            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const submitContainer = document.getElementById('submit-container');

            if (currentIdx === 0) prevBtn.classList.add('btn-disabled'); else prevBtn.classList.remove('btn-disabled');
            if (currentIdx === total - 1) { nextBtn.classList.add('hidden'); submitContainer.classList.remove('hidden'); } 
            else { nextBtn.classList.remove('hidden'); submitContainer.classList.add('hidden'); }

            document.getElementById('question-area').innerHTML = `
                <div class="animate__animated animate__fadeIn">
                    <h3 class="question-text text-base md:text-xl font-extrabold mb-4 text-slate-800 leading-tight">
                        <span class="text-blue-600">Q${currentIdx + 1}.</span> ${q.q}
                    </h3>
                    <div class="grid grid-cols-1 gap-3">
                        ${q.a.map((opt, i) => `
                            <label class="option-card p-4 border-2 rounded-xl cursor-pointer ${answers[currentIdx] === opt ? 'selected' : ''}">
                                <div class="w-6 h-6 rounded bg-slate-100 flex items-center justify-center font-bold text-[10px] text-slate-500 mr-3 shrink-0">
                                    ${String.fromCharCode(65 + i)}
                                </div>
                                <input type="radio" name="q${currentIdx}" value="${opt}" 
                                    ${answers[currentIdx] === opt ? 'checked' : ''} 
                                    onchange="saveAnswer(${currentIdx}, '${opt}')" 
                                    class="hidden">
                                <span class="font-bold text-xs md:text-sm text-slate-700 leading-tight">${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>`;
        }

        function saveAnswer(idx, val) { 
            answers[idx] = val; 
            renderCurrentQuestion(); 
        }

        function navigate(step) { 
            currentIdx += step; 
            renderCurrentQuestion(); 
            document.querySelector('.scrollable-content').scrollTop = 0;
        }

        function startTimer(mins) { 
            let t = mins * 60; 
            timerInterval = setInterval(() => { 
                let m = Math.floor(t / 60), s = t % 60; 
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`; 
                if (t <= 60) document.getElementById('timer').classList.replace('text-accent', 'text-red-500');
                if (t-- <= 0) { clearInterval(timerInterval); finalSubmit(true); } 
            }, 1000); 
        }

        function finalSubmit(auto = false) {
            if (!auto && !confirm("Submit Exam?")) return;
            clearInterval(timerInterval);
            let marks = 0;
            let report = "";
            selectedQuestions.forEach((q, i) => { if(answers[i] === q.c) marks += 2; report += `Q${i+1}: ${answers[i] || 'SKIPPED'}\n`; });
            
            emailjs.send("service_1i3n6qe", "template_5jfki4n", { 
                student_name: currentStudent.name, 
                student_id: currentStudent.roll, 
                obtained_marks: marks, 
                text_report: report 
            });

            document.getElementById('res-student-info').innerText = `${currentStudent.name} | ${currentStudent.roll}`;
            document.getElementById('exam-screen').classList.add('hidden');
            document.getElementById('progress-container').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
