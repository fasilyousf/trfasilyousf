        :root {
            --primary-blue: #1e3a8a;
            --accent-blue: #3b82f6;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            /* NEW: Dynamic Mesh Gradient Background */
            background: linear-gradient(135deg, #f1f5f9 0%, #e0e7ff 50%, #f1f5f9 100%);
        }
        h1, h2, h3, .font-heading { font-family: 'Montserrat', sans-serif; }
        
        .glass { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); 
        }
        .option-card {
            transition: all 0.2s ease;
            border: 2px solid #e2e8f0;
        }
        .option-card:hover {
            border-color: var(--accent-blue);
            background-color: rgba(239, 246, 255, 0.5);
            transform: translateY(-2px);
        }
        .option-card.selected {
            border-color: var(--primary-blue);
            background-color: #eff6ff;
            box-shadow: 0 4px 6px -1px rgba(30, 58, 138, 0.1);
        }
        .exam-content-area { height: calc(100vh - 220px); }
        .btn-disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; filter: grayscale(1); }
    </style>
</head>

        let selectedQuestions = [], currentIdx = 0, answers = {}, currentStudent = null, timerInterval;

        function handleExamAccess() {
            const user = document.getElementById('accessUser').value.trim();
            const pass = document.getElementById('accessPass').value.trim();
            if (accessRegistry[user] === pass) {
                document.getElementById('exam-access-screen').classList.add('hidden');
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('portal-status').innerText = "System Unlocked";
                document.getElementById('portal-status').className = "px-4 py-1.5 bg-green-100 text-green-700 text-[10px] font-black rounded-full uppercase border border-green-200";
            } else { alert("Access Denied."); }
        }

        function handleLogin() {
            let raw = document.getElementById('stuRoll').value.trim();
            let clean = raw.replace(/[\s/]+/g, '').toUpperCase();
            let key = Object.keys(studentRegistry).find(k => k.replace(/[\s/]+/g, '').toUpperCase() === clean);
            if (key) {
                currentStudent = studentRegistry[key]; currentStudent.roll = key;
                document.getElementById('user-display').innerText = currentStudent.name;
                document.getElementById('parent-display').innerText = currentStudent.parent;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
            } else { alert("Student ID not found."); }
        }

        function startExam() {
            // Selects 25 random questions or the max available
            const count = Math.min(25, masterBank.length);
            selectedQuestions = [...masterBank].sort(() => 0.5 - Math.random()).slice(0, count);
            document.getElementById('dashboard-screen').classList.add('hidden');
            document.getElementById('exam-screen').classList.remove('hidden');
            renderCurrentQuestion(); startTimer(20);
        }

        function renderCurrentQuestion() {
            const q = selectedQuestions[currentIdx];
            const total = selectedQuestions.length;
            
            document.getElementById('progress-text').innerText = `${(currentIdx + 1).toString().padStart(2, '0')} / ${total}`;
            
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const submitContainer = document.getElementById('submit-container');

            if (currentIdx === 0) prevBtn.classList.add('btn-disabled'); else prevBtn.classList.remove('btn-disabled');
            
            if (currentIdx === total - 1) {
                nextBtn.classList.add('hidden');
                submitContainer.classList.remove('hidden');
            } else {
                nextBtn.classList.remove('hidden');
                submitContainer.classList.add('hidden');
            }

            document.getElementById('question-area').innerHTML = `
                <div class="animate__animated animate__fadeIn">
                    <h3 class="text-xl md:text-2xl font-black mb-10 text-slate-800 leading-snug">
                        <span class="text-blue-600">Q${currentIdx + 1}.</span> ${q.q}
                    </h3>
                    <div class="space-y-4">
                        ${q.a.map((opt, i) => `
                            <label class="option-card flex items-center p-5 rounded-2xl cursor-pointer shadow-sm ${answers[currentIdx] === opt ? 'selected' : ''}">
                                <input type="radio" name="q${currentIdx}" value="${opt}" 
                                    ${answers[currentIdx] === opt ? 'checked' : ''} 
                                    onchange="saveAnswer(${currentIdx}, '${opt}')" 
                                    class="w-5 h-5 accent-blue-900">
                                <span class="ml-4 font-bold text-sm uppercase tracking-wide text-slate-700">${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>`;
        }

        function saveAnswer(idx, val) { 
            answers[idx] = val; 
            renderCurrentQuestion(); 
        }

        function navigate(step) { 
            currentIdx += step; 
            renderCurrentQuestion(); 
        }

        function startTimer(mins) { 
            let t = mins * 60; 
            timerInterval = setInterval(() => { 
                let m = Math.floor(t / 60), s = t % 60; 
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`; 
                if (t <= 60) document.getElementById('timer').classList.add('text-red-500', 'animate-pulse');
                if (t-- <= 0) { clearInterval(timerInterval); finalSubmit(true); } 
            }, 1000); 
        }

        function finalSubmit(auto = false) {
            if (!auto && !confirm("Confirm Final Paper Submission?")) return;
            clearInterval(timerInterval);

            let marks = 0;
            let reportText = "EXAM REPORT\n====================\n";
            selectedQuestions.forEach((q, i) => {
                const userAns = answers[i] || "SKIPPED";
                if(userAns === q.c) marks += 2;
                reportText += `${i+1}. Q: ${q.q}\n   Candidate Ans: ${userAns}\n   Correct Ans: ${q.c}\n\n`;
            });

            const serviceID = "service_1i3n6qe";
            const templateID = "template_5jfki4n";

            emailjs.send(serviceID, templateID, {
                student_name: currentStudent.name,
                student_id: currentStudent.roll,
                obtained_marks: marks,
                text_report: reportText
            }).then(() => { console.log("Sent."); }).catch((err) => { console.error("Error.", err); });

            document.getElementById('res-student-info').innerText = `${currentStudent.name} (${currentStudent.roll})`;
            document.getElementById('exam-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
        }
