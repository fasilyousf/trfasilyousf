<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FyOrbit | Login – Students, Staff, Institute Heads</title>
    <link rel="shortcut icon" href="../assets/img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Outfit', sans-serif;
        }
        body {
            background: #f0f4f8;
        }
        input:focus {
            box-shadow: 0 0 0 2px #f5b81b;
            border-color: #f5b81b;
            outline: none;
        }
        .btn-login {
            background: linear-gradient(105deg, #0b1120, #1e293b);
            transition: all 0.3s;
        }
        .btn-login:hover {
            background: linear-gradient(105deg, #f5b81b, #e67e22);
            color: #0b1120;
        }
        .loader {
            border-top-color: #f5b81b;
            animation: spinner 0.8s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .required-star:after {
            content: "*";
            color: #e53e3e;
            margin-left: 4px;
        }
        .error-text {
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Header Mini (branding) -->
    <div class="bg-[#0b1120] text-white py-4 px-6 shadow-lg">
        <div class="max-w-6xl mx-auto flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center shadow-lg transform group-hover:rotate-12 transition duration-300 overflow-hidden">
                <img src="../assets/img/slogo.png" alt="FyOrbit Logo" class="w-full h-full object-cover">
            </div>
            <div class="text-xl font-black tracking-tight"><a href="../index.html">Fy<span class="text-[#f5b81b]">Orbit</span></a></div>
            <div class="ml-auto text-sm font-medium opacity-80">Digital Management Ecosystem</div>
        </div>
    </div>

    <!-- Login Form Container -->
    <div class="max-w-md mx-auto px-4 py-16 md:py-20">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
            <div class="bg-gradient-to-r from-[#0b1120] to-[#1a2538] px-6 py-8 text-center">
                <i class="fas fa-lock text-4xl text-[#f5b81b] mb-2"></i>
                <h1 class="text-3xl font-black text-white">Welcome back</h1>
                <p class="text-slate-300 mt-1 text-sm">Sign in to your FyOrbit account</p>
            </div>

            <div class="p-6 md:p-8">
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 required-star">Email Address</label>
                        <input type="email" id="loginEmail" class="mt-1 w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-[#f5b81b] outline-none" placeholder="hello@example.com">
                        <div id="emailError" class="error-text text-red-500 hidden"></div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 required-star">Password</label>
                        <input type="password" id="loginPassword" class="mt-1 w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-[#f5b81b]" placeholder="Enter your password">
                        <div id="passwordError" class="error-text text-red-500 hidden"></div>
                    </div>
                    <div class="flex justify-between items-center text-sm">
                        <label class="flex items-center gap-2">
                            <input type="checkbox" id="rememberMe" class="accent-[#f5b81b]"> <span class="text-gray-600">Remember me</span>
                        </label>
                        <a href="forgot-password.html" class="text-[#f5b81b] font-bold hover:underline">Forgot password?</a>
                    </div>
                    <button id="loginBtn" class="btn-login w-full py-3.5 rounded-xl font-black uppercase tracking-wider text-white transition-all shadow-lg flex items-center justify-center gap-2">
                        <span id="btnText">Sign In</span>
                        <i class="fas fa-sign-in-alt" id="btnIcon"></i>
                        <div id="btnLoader" class="loader hidden rounded-full border-2 border-t-2 border-gray-200 h-5 w-5"></div>
                    </button>
                </div>

                <div class="mt-8 text-center border-t pt-6 border-gray-200">
                    <p class="text-gray-500 text-sm">Don't have an account? <a href="register.html" class="text-[#f5b81b] font-bold">Register now</a></p>
                    <p class="text-gray-400 text-xs mt-3">© 2026 FyOrbit — Secure access for institutions</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, signInWithEmailAndPassword } from "firebase/auth";
        import { getFirestore, doc, getDoc } from "firebase/firestore";

        const firebaseConfig = {
            apiKey: "AIzaSyCny3ldh6tjeGLVQPgDQEHfDSFP--c6Hj4",
            authDomain: "trfasilyousf1.firebaseapp.com",
            projectId: "trfasilyousf1",
            storageBucket: "trfasilyousf1.firebasestorage.app",
            messagingSenderId: "158147210589",
            appId: "1:158147210589:web:1cfed2fc691fa4a13a0cb4",
            measurementId: "G-JJ5GE7HS02"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const loginBtn = document.getElementById('loginBtn');
        const emailInput = document.getElementById('loginEmail');
        const passwordInput = document.getElementById('loginPassword');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const btnLoader = document.getElementById('btnLoader');
        const rememberCheckbox = document.getElementById('rememberMe');

        if (localStorage.getItem('rememberedEmail')) {
            emailInput.value = localStorage.getItem('rememberedEmail');
            rememberCheckbox.checked = true;
        }

        function showError(element, message) {
            element.innerText = message;
            element.classList.remove('hidden');
        }
        function hideError(element) {
            element.classList.add('hidden');
            element.innerText = '';
        }
        function setLoading(isLoading) {
            if (isLoading) {
                loginBtn.disabled = true;
                btnText.innerText = "Verifying...";
                btnIcon.classList.add('hidden');
                btnLoader.classList.remove('hidden');
            } else {
                loginBtn.disabled = false;
                btnText.innerText = "Sign In";
                btnIcon.classList.remove('hidden');
                btnLoader.classList.add('hidden');
            }
        }
        function validateForm() {
            let isValid = true;
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            hideError(emailError);
            hideError(passwordError);
            emailInput.classList.remove('border-red-500');
            passwordInput.classList.remove('border-red-500');
            if (!email) {
                showError(emailError, "Email address is required");
                emailInput.classList.add('border-red-500');
                isValid = false;
            } else if (!/^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/.test(email)) {
                showError(emailError, "Enter a valid email address");
                emailInput.classList.add('border-red-500');
                isValid = false;
            }
            if (!password) {
                showError(passwordError, "Password is required");
                passwordInput.classList.add('border-red-500');
                isValid = false;
            } else if (password.length < 6) {
                showError(passwordError, "Password must be at least 6 characters");
                passwordInput.classList.add('border-red-500');
                isValid = false;
            }
            return isValid;
        }

        async function handleLogin(e) {
            e.preventDefault();
            if (!validateForm()) return;
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            setLoading(true);
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                if (rememberCheckbox.checked) {
                    localStorage.setItem('rememberedEmail', email);
                } else {
                    localStorage.removeItem('rememberedEmail');
                }
                const userDocRef = doc(db, "users", user.uid);
                const userDoc = await getDoc(userDocRef);
                let role = 'student';
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    role = userData.role || 'student';
                }
                if (role === 'admin' || role === 'institute_head') {
                    window.location.href = "../admin/dashboard.html";
                } 
                else if (role === 'staff' || role === 'teacher') {
                    window.location.href = "../teacher/dashboard.html";
                } 
                else {
                    window.location.href = "../student/dashboard.html";
                }
            } catch (error) {
                console.error("Login error:", error.code);
                let errorMsg = "Login failed. Please check your credentials.";
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    errorMsg = "Invalid email or password.";
                } else if (error.code === 'auth/too-many-requests') {
                    errorMsg = "Too many failed attempts. Please try again later.";
                }
                alert(errorMsg);
                setLoading(false);
            }
        }

        loginBtn.addEventListener('click', handleLogin);
        [emailInput, passwordInput].forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleLogin(e);
            });
        });
    </script>
</body>
</html>
