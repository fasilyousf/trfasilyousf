<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Reset Password | FyOrbit</title>
    <link rel="shortcut icon" href="../assets/img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Outfit', sans-serif;
        }
        body {
            background: #f0f4f8;
        }
        input:focus {
            box-shadow: 0 0 0 2px #f5b81b;
            border-color: #f5b81b;
            outline: none;
        }
        .btn-reset {
            background: linear-gradient(105deg, #0b1120, #1e293b);
            transition: all 0.3s;
        }
        .btn-reset:hover {
            background: linear-gradient(105deg, #f5b81b, #e67e22);
            color: #0b1120;
        }
        .loader {
            border-top-color: #f5b81b;
            animation: spinner 0.8s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-text {
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }
        .success-text {
            font-size: 0.75rem;
            margin-top: 0.25rem;
            color: #10b981;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Header (matches login page) -->
    <div class="bg-[#0b1120] text-white py-4 px-6 shadow-lg">
        <div class="max-w-6xl mx-auto flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center shadow-lg transform group-hover:rotate-12 transition duration-300 overflow-hidden">
                <img src="../assets/img/slogo.png" alt="FyOrbit Logo" class="w-full h-full object-cover">
            </div>
            <div class="text-xl font-black tracking-tight"><a href="../index.html">Fy<span class="text-[#f5b81b]">Orbit</span></a></div>
            <div class="ml-auto text-sm font-medium opacity-80">Digital Management Ecosystem</div>
        </div>
    </div>

    <!-- Forgot Password Form Container -->
    <div class="max-w-md mx-auto px-4 py-16 md:py-20">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
            <div class="bg-gradient-to-r from-[#0b1120] to-[#1a2538] px-6 py-8 text-center">
                <i class="fas fa-key text-4xl text-[#f5b81b] mb-2"></i>
                <h1 class="text-3xl font-black text-white">Reset Password</h1>
                <p class="text-slate-300 mt-1 text-sm">We'll send a reset link to your email</p>
            </div>

            <div class="p-6 md:p-8">
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-gray-700">Email Address</label>
                        <input type="email" id="resetEmail" class="mt-1 w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-[#f5b81b]" placeholder="hello@example.com">
                        <div id="emailError" class="error-text text-red-500 hidden"></div>
                        <div id="emailSuccess" class="success-text hidden"></div>
                    </div>
                    <button id="sendResetBtn" class="btn-reset w-full py-3.5 rounded-xl font-black uppercase tracking-wider text-white transition-all shadow-lg flex items-center justify-center gap-2">
                        <span id="btnText">Send Reset Link</span>
                        <i class="fas fa-paper-plane" id="btnIcon"></i>
                        <div id="btnLoader" class="loader hidden rounded-full border-2 border-t-2 border-gray-200 h-5 w-5"></div>
                    </button>
                </div>
                <div class="mt-6 text-center">
                    <a href="login.html" class="text-[#f5b81b] font-bold hover:underline">← Back to Login</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, sendPasswordResetEmail } from "firebase/auth";

        const firebaseConfig = {
            apiKey: "AIzaSyCny3ldh6tjeGLVQPgDQEHfDSFP--c6Hj4",
            authDomain: "trfasilyousf1.firebaseapp.com",
            projectId: "trfasilyousf1",
            storageBucket: "trfasilyousf1.firebasestorage.app",
            messagingSenderId: "158147210589",
            appId: "1:158147210589:web:1cfed2fc691fa4a13a0cb4",
            measurementId: "G-JJ5GE7HS02"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const emailInput = document.getElementById('resetEmail');
        const sendBtn = document.getElementById('sendResetBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const btnLoader = document.getElementById('btnLoader');
        const emailError = document.getElementById('emailError');
        const emailSuccess = document.getElementById('emailSuccess');

        function setLoading(isLoading) {
            if (isLoading) {
                sendBtn.disabled = true;
                btnText.innerText = "Sending...";
                btnIcon.classList.add('hidden');
                btnLoader.classList.remove('hidden');
            } else {
                sendBtn.disabled = false;
                btnText.innerText = "Send Reset Link";
                btnIcon.classList.remove('hidden');
                btnLoader.classList.add('hidden');
            }
        }

        function validateEmail(email) {
            return /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/.test(email);
        }

        sendBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            emailError.classList.add('hidden');
            emailSuccess.classList.add('hidden');

            if (!email || !validateEmail(email)) {
                emailError.innerText = "Please enter a valid email address.";
                emailError.classList.remove('hidden');
                return;
            }

            setLoading(true);

            try {
                // Directly call sendPasswordResetEmail – Firebase will check existence
                await sendPasswordResetEmail(auth, email);
                
                emailSuccess.innerText = "✅ Reset link sent! Check your email (and spam folder).";
                emailSuccess.classList.remove('hidden');
                
                // Redirect after 3 seconds
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 3000);
                
            } catch (error) {
                console.error("Reset error:", error);
                let errorMsg = "Failed to send reset email.";
                
                if (error.code === 'auth/user-not-found') {
                    errorMsg = "❌ No account found with this email. Please register first.";
                } else if (error.code === 'auth/invalid-email') {
                    errorMsg = "❌ Invalid email format.";
                } else if (error.code === 'auth/too-many-requests') {
                    errorMsg = "Too many requests. Please try again later.";
                } else if (error.message) {
                    errorMsg = error.message;
                }
                
                emailError.innerText = errorMsg;
                emailError.classList.remove('hidden');
                setLoading(false);
            }
        });

        // Allow Enter key submission
        emailInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendBtn.click();
            }
        });
    </script>
</body>
</html>
