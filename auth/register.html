<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | UCC Handwara Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass-container { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .bg-animate {
            background: linear-gradient(-45deg, #1a2233, #2c3e50, #1a2233, #f1c40f);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .input-focus:focus { border-color: #f1c40f; box-shadow: 0 0 0 4px rgba(241, 196, 15, 0.1); }
        .loader { border-top-color: #f1c40f; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script type="text/javascript">
        (function () {
            // Initializing with your Public Key
            emailjs.init("BZ2E5BMbDJgulIhEo");
        })();
    </script>
</head>

<body class="bg-animate min-h-screen flex items-center justify-center p-6 py-12">

    <a href="../index.html"
        class="absolute top-8 left-8 text-white/80 hover:text-white flex items-center gap-2 font-semibold transition">
        <i class="fas fa-arrow-left"></i> Back to Home
    </a>

    <div class="w-full max-w-lg">
        <div class="text-center mb-8">
            <div class="inline-flex w-16 h-16 bg-[#f1c40f] rounded-2xl items-center justify-center shadow-xl mb-4 transform rotate-6">
                <i class="fas fa-user-plus text-[#2c3e50] text-3xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-white tracking-tight">Scholar <span class="text-[#f1c40f]">Registration</span></h1>
            <p class="text-white/60 text-sm mt-2">United Community College Handwara</p>
        </div>

        <div class="glass-container rounded-[2.5rem] p-8 md:p-12 shadow-2xl">
            <form id="registerForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <div class="md:col-span-2">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 ml-1">Full Legal Name</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400"><i class="fas fa-user"></i></span>
                        <input type="text" id="regName" placeholder="Student Name" required
                            class="w-full pl-11 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none input-focus transition-all text-slate-700">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 ml-1">Email Address</label>
                    <input type="email" id="regEmail" placeholder="mail@example.com" required
                        class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none input-focus transition-all text-slate-700">
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 ml-1">Phone Number</label>
                    <input type="tel" id="regPhone" placeholder="7006XXXXXX" required
                        class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none input-focus transition-all text-slate-700">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 ml-1">Admission Code</label>
                    <input type="text" id="regInstCode" placeholder="Enter UCC2026" required
                        class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none input-focus transition-all text-slate-700 font-bold uppercase tracking-widest text-center">
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 ml-1">Create Password</label>
                    <input type="password" id="regPass" placeholder="••••••••" required
                        class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none input-focus transition-all text-slate-700">
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 ml-1">Confirm</label>
                    <input type="password" id="regConfirmPass" placeholder="••••••••" required
                        class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none input-focus transition-all text-slate-700">
                </div>

                <button type="submit" id="submitBtn"
                    class="md:col-span-2 w-full py-4 bg-[#1a2233] text-white font-black rounded-2xl shadow-xl hover:bg-black transition-all flex items-center justify-center gap-3 uppercase tracking-[0.2em] text-xs">
                    <span id="btnText">Initialize Account</span>
                    <div id="btnLoader" class="loader hidden rounded-full border-2 border-t-2 border-white/20 h-4 w-4"></div>
                </button>
            </form>

            <div class="mt-8 text-center pt-6 border-t border-slate-100">
                <p class="text-slate-400 font-bold text-[10px] uppercase tracking-widest">
                    Already a scholar? <a href="login.html" class="text-[#f1c40f] hover:underline ml-1">Login</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCny3ldh6tjeGLVQPgDQEHfDSFP--c6Hj4",
            authDomain: "trfasilyousf1.firebaseapp.com",
            projectId: "trfasilyousf1",
            storageBucket: "trfasilyousf1.firebasestorage.app",
            messagingSenderId: "158147210589",
            appId: "1:158147210589:web:1cfed2fc691fa4a13a0cb4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const loader = document.getElementById('btnLoader');
            const txt = document.getElementById('btnText');

            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const pass = document.getElementById('regPass').value;
            const instCode = document.getElementById('regInstCode').value.toUpperCase();

            // Form Validations
            if (instCode !== "UCC2026") {
                alert("Invalid Admission Code!");
                return;
            }
            if (pass !== document.getElementById('regConfirmPass').value) {
                alert("Passwords do not match!");
                return;
            }

            // Start Loader
            btn.disabled = true;
            txt.innerText = "Processing...";
            loader.classList.remove('hidden');

            try {
                // STEP 1: Create Account in Firebase Auth
                const cred = await createUserWithEmailAndPassword(auth, email, pass);

                // STEP 2: Save Data to Firestore
                await setDoc(doc(db, "users", cred.user.uid), {
                    fullName: name,
                    email: email,
                    phoneNumber: phone,
                    role: "student",
                    createdAt: new Date().toISOString(),
                    status: "active"
                });

                // STEP 3: Attempt Email (Fail-Safe)
                try {
                    const emailParams = {
                        user_name: name,   // Matches {{user_name}} in your template
                        user_email: email  // Matches {{user_email}} in your template
                    };
                    // Using your Service and Template ID
                    await emailjs.send("service_qlu55cj", "template_8zpsoqv", emailParams);
                    console.log("Welcome email sent!");
                } catch (emailErr) {
                    console.error("EmailJS Error:", emailErr);
                }

                alert("Registration Successful! Welcome to UCC Handwara.");
                window.location.href = "login.html";

            } catch (err) {
                console.error("Firebase Error:", err);
                // Friendly error messages based on Firebase codes
                let msg = "Registration Failed: " + (err.message || "Unknown error");
                if (err.code === 'auth/email-already-in-use') msg = "This email is already registered.";
                if (err.code === 'auth/weak-password') msg = "Password must be at least 6 characters.";
                
                alert(msg);
            } finally {
                btn.disabled = false;
                txt.innerText = "Initialize Account";
                loader.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
