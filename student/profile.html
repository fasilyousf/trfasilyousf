<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Profile | UCC Handwara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f1f5f9; }
        .sidebar-gradient { background: #1a2233; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .input-box { 
            width: 100%;
            padding: 1rem;
            background-color: white;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            outline: none;
            transition: all 0.2s;
            font-weight: 500;
            color: #1e293b;
            box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05);
        }
        .input-box:focus {
            border-color: #f1c40f;
            ring: 4px solid rgba(241,196,15,0.1);
            transform: scale(1.01);
        }
        .label-text { 
            display: block;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            margin-left: 0.5rem;
        }
        .active-link { background: rgba(241, 196, 15, 0.1); border-left: 4px solid #f1c40f; color: #f1c40f !important; }
        .ucc-gold { color: #f1c40f; }

        /* Mobile sidebar – fixed positioning */
        @media (max-width: 768px) {
            .sidebar-mobile {
                position: fixed;
                top: 0;
                left: 0;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 1000;
                width: 280px;
                height: 100vh;
                overflow-y: auto;
            }
            .sidebar-mobile.active {
                transform: translateX(0);
            }
            .sidebar-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
                display: none;
            }
            .sidebar-overlay.active {
                display: block;
            }
        }
    </style>
</head>
<body class="flex min-h-screen">

    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <aside id="sidebar" class="sidebar-mobile w-72 sidebar-gradient text-white flex flex-col shadow-2xl shrink-0">
        <div class="p-8 text-center md:text-left flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-[#f1c40f] rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fas fa-university text-slate-900"></i>
                </div>
                <h1 class="text-xl font-black tracking-tighter uppercase text-white">UCC <span class="ucc-gold">Portal</span></h1>
            </div>
            <button id="closeSidebar" class="md:hidden text-white text-2xl"><i class="fas fa-times"></i></button>
        </div>
        
        <nav class="flex-grow px-4 mt-6 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-4 p-4 hover:bg-white/5 rounded-2xl transition text-slate-400 hover:text-white group">
                <i class="fas fa-th-large"></i> <span class="font-bold text-sm uppercase">Dashboard</span>
            </a>
            <a href="attendance.html" class="flex items-center gap-4 p-4 hover:bg-white/5 rounded-2xl transition text-slate-400 hover:text-white group">
                <i class="fas fa-calendar-check"></i> <span class="font-bold text-sm uppercase">Attendance</span>
            </a>
            <a href="profile.html" class="active-link flex items-center gap-4 p-4 rounded-2xl transition group">
                <i class="fas fa-user-circle"></i> <span class="font-bold text-sm uppercase">My Profile</span>
            </a>
        </nav>

        <div class="p-6 border-t border-white/5">
            <button onclick="logout()" class="w-full flex items-center gap-4 p-4 text-rose-500 font-black text-xs uppercase hover:bg-rose-500/10 rounded-2xl transition">
                <i class="fas fa-power-off"></i> <span>Sign Out</span>
            </button>
        </div>
    </aside>

    <main class="flex-grow p-4 md:p-10 overflow-x-hidden">
        
        <!-- Mobile header with sidebar toggle -->
        <div class="flex md:hidden justify-between items-center mb-6">
            <button id="openSidebar" class="text-slate-800 text-2xl p-2 bg-white rounded-xl shadow-sm"><i class="fas fa-bars"></i></button>
            <div class="w-10 h-10 bg-ucc-gold rounded-full flex items-center justify-center font-black">UCC</div>
        </div>

        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div>
                <h2 class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">Manage My Profile</h2>
                <p class="text-slate-500 font-medium text-sm md:text-base">Keep your scholar records up to date</p>
            </div>
            <div class="glass-card px-5 py-3 rounded-2xl shadow-sm border-b-4 border-[#f1c40f] flex items-center gap-4">
               <div class="relative">
                    <img id="profileImg" src="https://via.placeholder.com/50" class="w-12 h-12 rounded-xl object-cover border-2 border-white shadow-md">
                    <label for="photoUpload" class="absolute -bottom-1 -right-1 bg-slate-900 text-ucc-gold w-6 h-6 rounded-lg flex items-center justify-center cursor-pointer text-[10px] border-2 border-white shadow-lg">
                        <i class="fas fa-camera" id="cameraIcon"></i>
                        <input type="file" id="photoUpload" class="hidden" accept="image/*">
                    </label>
               </div>
               <div>
                    <h4 id="displayName" class="font-black text-slate-800 text-sm tracking-tight leading-none">Syncing...</h4>
                    <p id="displayEmail" class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest">---</p>
               </div>
            </div>
        </header>

        <div class="glass-card rounded-[2rem] md:rounded-[2.5rem] p-6 md:p-12 shadow-xl mb-12">
            <form id="profileForm" class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                
                <div class="md:col-span-2 flex items-center gap-4 mb-2">
                    <h3 class="text-[10px] font-black uppercase tracking-[0.4em] text-slate-400">Background Details</h3>
                    <div class="h-px flex-grow bg-slate-100"></div>
                </div>

                <div class="space-y-1">
                    <label class="label-text">Father's Name</label>
                    <input type="text" id="fatherName" class="input-box" placeholder="As per documents">
                </div>

                <div class="space-y-1">
                    <label class="label-text">Mother's Name</label>
                    <input type="text" id="motherName" class="input-box" placeholder="Full name">
                </div>

                <div class="space-y-1">
                    <label class="label-text">Date of Birth</label>
                    <input type="date" id="dob" class="input-box">
                </div>

                <div class="space-y-1">
                    <label class="label-text">Qualification</label>
                    <select id="qualification" class="input-box">
                        <option value="">Select Level</option>
                        <option value="10th">Secondary (10th)</option>
                        <option value="12th">Hr. Secondary (12th)</option>
                        <option value="Graduate">Undergraduate</option>
                        <option value="Post-Graduate">Post Graduate</option>
                    </select>
                </div>

                <div class="md:col-span-2 flex items-center gap-4 my-4">
                    <h3 class="text-[10px] font-black uppercase tracking-[0.4em] text-slate-400">Contact Registry</h3>
                    <div class="h-px flex-grow bg-slate-100"></div>
                </div>

                <div class="space-y-1">
                    <label class="label-text"><i class="fab fa-whatsapp text-green-500 mr-1"></i> WhatsApp Number</label>
                    <input type="tel" id="whatsapp" class="input-box" placeholder="+91">
                </div>

                <div class="space-y-1">
                    <label class="label-text">Emergency Contact</label>
                    <input type="tel" id="fatherContact" class="input-box" placeholder="Primary Contact">
                </div>

                <div class="md:col-span-2 mt-6">
                    <button type="submit" id="saveBtn" class="w-full py-4 md:py-5 bg-slate-900 text-white font-black uppercase tracking-[0.2em] rounded-2xl shadow-xl hover:bg-[#f1c40f] hover:text-slate-900 transition-all duration-300 transform active:scale-[0.98] flex items-center justify-center gap-3 text-sm md:text-base">
                        Save Database Profile <i class="fas fa-cloud-upload-alt"></i>
                    </button>
                    <p class="text-center text-[9px] text-slate-400 font-bold mt-4 uppercase tracking-[0.2em]">Encrypted sync with UCC Handwara Database</p>
                </div>

            </form>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCny3ldh6tjeGLVQPgDQEHfDSFP--c6Hj4",
            authDomain: "trfasilyousf1.firebaseapp.com",
            projectId: "trfasilyousf1",
            storageBucket: "trfasilyousf1.firebasestorage.app",
            messagingSenderId: "158147210589",
            appId: "1:158147210589:web:1cfed2fc691fa4a13a0cb4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('displayName').innerText = data.fullName || "Scholar";
                    document.getElementById('displayEmail').innerText = data.email;
                    document.getElementById('fatherName').value = data.fatherName || "";
                    document.getElementById('motherName').value = data.motherName || "";
                    document.getElementById('dob').value = data.dob || "";
                    document.getElementById('qualification').value = data.qualification || "";
                    document.getElementById('whatsapp').value = data.whatsapp || "";
                    document.getElementById('fatherContact').value = data.fatherContact || "";
                    if(data.profilePic) document.getElementById('profileImg').src = data.profilePic;
                }
            } else {
                window.location.href = "../auth/login.html";
            }
        });

        // Professional Photo Upload
        document.getElementById('photoUpload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const icon = document.getElementById('cameraIcon');
            icon.className = "fas fa-spinner fa-spin";
            const storageRef = ref(storage, `profiles/${auth.currentUser.uid}`);
            try {
                const snapshot = await uploadBytes(storageRef, file);
                const url = await getDownloadURL(snapshot.ref);
                await updateDoc(doc(db, "users", auth.currentUser.uid), { profilePic: url });
                document.getElementById('profileImg').src = url;
            } catch (err) { alert("Upload failed."); } 
            finally { icon.className = "fas fa-camera"; }
        });

        // Save Form Logic
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; 
            btn.innerHTML = "Syncing... <i class='fas fa-sync fa-spin'></i>";
            try {
                await updateDoc(doc(db, "users", auth.currentUser.uid), {
                    fatherName: document.getElementById('fatherName').value,
                    motherName: document.getElementById('motherName').value,
                    dob: document.getElementById('dob').value,
                    qualification: document.getElementById('qualification').value,
                    whatsapp: document.getElementById('whatsapp').value,
                    fatherContact: document.getElementById('fatherContact').value
                });
                alert("Registry Updated!");
            } catch (err) { alert("Sync Error."); } 
            finally { 
                btn.disabled = false; 
                btn.innerHTML = 'Save Database Profile <i class="fas fa-cloud-upload-alt"></i>';
            }
        });

        window.logout = async () => {
            if(confirm("Sign out of UCC Portal?")) {
                await signOut(auth);
                window.location.href = "../index.html";
            }
        };

        // MOBILE SIDEBAR TOGGLE
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const openBtn = document.getElementById('openSidebar');
        const closeBtn = document.getElementById('closeSidebar');

        function toggleSidebar() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        if (openBtn) openBtn.addEventListener('click', toggleSidebar);
        if (closeBtn) closeBtn.addEventListener('click', toggleSidebar);
        if (overlay) overlay.addEventListener('click', toggleSidebar);
    </script>
</body>
</html>
