<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Profile | FyOrbit Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="../assets/img/favicon.png" type="image/x-icon">
    <style>
        * { font-family: 'Outfit', sans-serif; }
        body { background: linear-gradient(135deg, #f0f4fa 0%, #e6ecf3 100%); }
        
        .glass-card { background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.7); }
        .sidebar-gradient { background: linear-gradient(165deg, #0f172a 0%, #0a0f1c 100%); }
        .active-link { background: rgba(241, 196, 15, 0.12); border-left: 3px solid #f1c40f; color: #f1c40f !important; }
        .fy-gold { color: #f1c40f; }
        
        .input-elegant {
            transition: all 0.2s ease;
            background: white;
            border: 1.5px solid #e2e8f0;
            width: 100%;
            padding: 0.9rem 1.25rem;
            border-radius: 1.25rem;
            font-weight: 500;
            color: #0f172a;
            font-size: 0.95rem;
        }
        .input-elegant:focus {
            border-color: #f1c40f;
            box-shadow: 0 0 0 4px rgba(241, 196, 15, 0.12);
            transform: scale(1.01);
            outline: none;
        }
        .upload-overlay {
            transition: all 0.2s ease;
        }
        .upload-overlay:hover {
            background: #f1c40f;
            transform: scale(1.08);
        }
        .stat-badge {
            background: linear-gradient(120deg, #fef9e6, #fff6e0);
            border-left: 3px solid #f1c40f;
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeSlideUp {
            animation: fadeSlideUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        /* Mobile sidebar – same as dashboard */
        @media (max-width: 768px) {
            .sidebar-mobile {
                position: fixed;
                top: 0;
                left: 0;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 1000;
                width: 280px;
                height: 100vh;
                overflow-y: auto;
            }
            .sidebar-mobile.active {
                transform: translateX(0);
            }
            .sidebar-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
                display: none;
            }
            .sidebar-overlay.active {
                display: block;
            }
        }
    </style>
</head>
<body class="flex min-h-screen">

    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <!-- Sidebar - FyOrbit Student Portal -->
    <aside id="sidebar" class="sidebar-mobile w-72 sidebar-gradient text-white flex flex-col shadow-2xl shrink-0">
        <div class="p-8 text-center md:text-left flex justify-between items-center">
            <div class="flex items-center gap-3">
                 <div
                    class="w-10 h-10  rounded-xl flex items-center justify-center shadow-lg transform group-hover:rotate-12 transition duration-300 overflow-hidden">
                    <img src="../assets/img/slogo.png" alt="FyOrbit Logo" class="w-full h-full object-cover">
                </div>
                <h1 class="text-xl font-black tracking-tighter uppercase text-white">Fy<span class="fy-gold">Orbit</span></h1>
            </div>
            <button id="closeSidebar" class="md:hidden text-white text-2xl"><i class="fas fa-times"></i></button>
        </div>
        
        <nav class="flex-grow px-4 mt-6 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-4 p-4 hover:bg-white/5 rounded-2xl transition text-slate-400 hover:text-white group">
                <i class="fas fa-th-large"></i> <span class="font-bold text-sm uppercase">Dashboard</span>
            </a>
            <a href="courses.html" class="flex items-center gap-4 p-4 hover:bg-white/5 rounded-2xl transition text-slate-400 hover:text-white group">
                <i class="fas fa-book-open"></i> <span class="font-bold text-sm uppercase">My Courses</span>
            </a>
            <a href="attendance.html" class="flex items-center gap-4 p-4 hover:bg-white/5 rounded-2xl transition text-slate-400 hover:text-white group">
                <i class="fas fa-calendar-check"></i> <span class="font-bold text-sm uppercase">Attendance</span>
            </a>
            <a href="profile.html" class="active-link flex items-center gap-4 p-4 rounded-2xl transition group">
                <i class="fas fa-user-circle"></i> <span class="font-bold text-sm uppercase">My Profile</span>
            </a>
        </nav>

        <div class="p-6 border-t border-white/5">
            <button onclick="logout()" class="w-full flex items-center gap-4 p-4 text-rose-500 font-black text-xs uppercase hover:bg-rose-500/10 rounded-2xl transition">
                <i class="fas fa-power-off"></i> <span>Sign Out</span>
            </button>
        </div>
    </aside>

    <main class="flex-grow p-4 md:p-10 overflow-x-hidden">
        
        <!-- Mobile header with sidebar toggle -->
        <div class="flex md:hidden justify-between items-center mb-6">
            <button id="openSidebar" class="text-slate-800 text-2xl p-2 bg-white rounded-xl shadow-sm"><i class="fas fa-bars"></i></button>
            <div class="w-10 h-10 bg-fy-gold rounded-full flex items-center justify-center font-black text-slate-900">FY</div>
        </div>

        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-6">
            <div>
                <h2 class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">My Profile</h2>
                <p class="text-slate-500 font-medium text-sm">Manage your personal & academic information</p>
            </div>
            <div class="glass-card rounded-2xl px-5 py-3 shadow-sm flex items-center gap-4 border border-white/60">
                <div class="relative group">
                    <img id="profileImg" src="https://via.placeholder.com/100" class="w-14 h-14 rounded-2xl object-cover border-2 border-white shadow-md bg-slate-100">
                    <label for="photoUpload" class="upload-overlay absolute -bottom-1 -right-1 bg-slate-800 text-[#f1c40f] w-6 h-6 rounded-xl flex items-center justify-center cursor-pointer text-[9px] border-2 border-white shadow-lg hover:bg-[#f1c40f] hover:text-slate-900 transition-all duration-200">
                        <i class="fas fa-camera" id="cameraIcon"></i>
                        <input type="file" id="photoUpload" class="hidden" accept="image/*">
                    </label>
                </div>
                <div>
                    <h4 id="displayName" class="font-black text-slate-800 text-base tracking-tight leading-tight">Loading...</h4>
                    <div class="flex items-center gap-2 mt-1">
                        <i class="fas fa-id-card text-[10px] text-slate-400"></i>
                        <p id="studentId" class="text-[10px] font-bold text-slate-500 uppercase tracking-wide">FY-XXXX</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8 animate-fadeSlideUp">
            <div class="stat-badge rounded-2xl p-4 bg-white/70 shadow-sm border border-white/50 flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-[#f1c40f]/15 flex items-center justify-center"><i class="fas fa-envelope text-[#f1c40f] text-lg"></i></div>
                <div><p class="text-[9px] font-black text-slate-400 uppercase">Email</p><p id="statEmail" class="font-bold text-slate-700 text-xs truncate max-w-[150px]">---</p></div>
            </div>
            <div class="stat-badge rounded-2xl p-4 bg-white/70 shadow-sm border border-white/50 flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-[#f1c40f]/15 flex items-center justify-center"><i class="fas fa-calendar-alt text-[#f1c40f] text-lg"></i></div>
                <div><p class="text-[9px] font-black text-slate-400 uppercase">Enrolled Since</p><p id="enrolledSince" class="font-bold text-slate-700 text-sm">---</p></div>
            </div>
            <div class="stat-badge rounded-2xl p-4 bg-white/70 shadow-sm border border-white/50 flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-[#f1c40f]/15 flex items-center justify-center"><i class="fas fa-book text-[#f1c40f] text-lg"></i></div>
                <div><p class="text-[9px] font-black text-slate-400 uppercase">Courses</p><p id="courseCount" class="font-bold text-slate-700 text-sm">0</p></div>
            </div>
        </div>

        <!-- Profile Form -->
        <div class="glass-card rounded-[2rem] p-6 md:p-8 shadow-xl">
            <form id="profileForm" class="space-y-8">
                <!-- Personal Information Section -->
                <div class="flex items-center gap-4 border-b border-slate-100 pb-4">
                    <div class="w-8 h-8 rounded-xl bg-slate-100 flex items-center justify-center"><i class="fas fa-user text-slate-600 text-sm"></i></div>
                    <h3 class="text-[11px] font-black uppercase tracking-[0.2em] text-slate-500">Personal Information</h3>
                    <div class="h-px flex-grow bg-gradient-to-r from-slate-200 to-transparent"></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-wider text-slate-500">Full Name</label>
                        <input type="text" id="fullName" class="input-elegant" readonly disabled style="background:#f8fafc; cursor:not-allowed;">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-wider text-slate-500">Email Address</label>
                        <input type="email" id="email" class="input-elegant" readonly disabled style="background:#f8fafc; cursor:not-allowed;">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-wider text-slate-500">Father's Name</label>
                        <input type="text" id="fatherName" class="input-elegant" placeholder="e.g., Abdul Rahman">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-wider text-slate-500">Mother's Name</label>
                        <input type="text" id="motherName" class="input-elegant" placeholder="e.g., Fatima Begum">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-wider text-slate-500">Date of Birth</label>
                        <input type="date" id="dob" class="input-elegant">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-wider text-slate-500">Qualification</label>
                        <select id="qualification" class="input-elegant bg-white">
                            <option value="">Select Level</option>
                            <option value="10th">Secondary (10th)</option>
                            <option value="12th">Higher Secondary (12th)</option>
                            <option value="Graduate">Graduate</option>
                            <option value="Postgraduate">Postgraduate</option>
                        </select>
                    </div>
                </div>

                <!-- Contact Section -->
                <div class="flex items-center gap-4 border-b border-slate-100 pb-4 pt-4">
                    <div class="w-8 h-8 rounded-xl bg-slate-100 flex items-center justify-center"><i class="fas fa-address-card text-slate-600 text-sm"></i></div>
                    <h3 class="text-[11px] font-black uppercase tracking-[0.2em] text-slate-500">Contact & Address</h3>
                    <div class="h-px flex-grow bg-gradient-to-r from-slate-200 to-transparent"></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-wider text-slate-500"><i class="fab fa-whatsapp text-green-500"></i> WhatsApp Number</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm">+91</span>
                            <input type="tel" id="whatsapp" class="input-elegant pl-12" placeholder="98765 43210">
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-wider text-slate-500">Guardian Contact</label>
                        <input type="tel" id="guardianContact" class="input-elegant" placeholder="+91 98765 43210">
                    </div>
                    <div class="md:col-span-2">
                        <label class="text-[10px] font-black uppercase tracking-wider text-slate-500">Residential Address</label>
                        <textarea id="address" rows="2" class="input-elegant resize-none" placeholder="House/Street, City, District, PIN"></textarea>
                    </div>
                </div>

                <button type="submit" id="saveBtn" class="group w-full py-4 bg-slate-800 text-white font-black uppercase tracking-[0.15em] rounded-2xl shadow-lg hover:bg-[#f1c40f] hover:text-slate-900 transition-all duration-300 flex items-center justify-center gap-3 text-sm">
                    <span>Update Profile</span>
                    <i class="fas fa-save group-hover:translate-y-[-2px] transition-transform"></i>
                </button>
            </form>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCny3ldh6tjeGLVQPgDQEHfDSFP--c6Hj4",
            authDomain: "trfasilyousf1.firebaseapp.com",
            projectId: "trfasilyousf1",
            storageBucket: "trfasilyousf1.firebasestorage.app",
            messagingSenderId: "158147210589",
            appId: "1:158147210589:web:1cfed2fc691fa4a13a0cb4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Cloudinary Settings
        const CLOUD_NAME = "dholrawub";
        const UPLOAD_PRESET = "portal_profile";

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-6 right-6 px-5 py-3 rounded-xl shadow-2xl z-[200] text-sm font-bold ${isError ? 'bg-rose-500 text-white' : 'bg-emerald-500 text-white'}`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'} mr-2"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.role !== 'student') {
                        showToast("Access denied. Student portal only.", true);
                        setTimeout(() => { window.location.href = "../index.html"; }, 1500);
                        return;
                    }
                    document.getElementById('displayName').innerText = data.fullName || "Student";
                    document.getElementById('fullName').value = data.fullName || "";
                    document.getElementById('email').value = data.email || "";
                    document.getElementById('studentId').innerText = `FY-${user.uid.slice(-6).toUpperCase()}`;
                    document.getElementById('statEmail').innerText = data.email || "---";
                    document.getElementById('enrolledSince').innerText = data.createdAt ? new Date(data.createdAt).toLocaleDateString('en-IN') : "2025";
                    document.getElementById('courseCount').innerText = (data.enrolledCourses?.length || 0);
                    document.getElementById('fatherName').value = data.fatherName || "";
                    document.getElementById('motherName').value = data.motherName || "";
                    document.getElementById('dob').value = data.dob || "";
                    document.getElementById('qualification').value = data.qualification || "";
                    document.getElementById('whatsapp').value = data.whatsapp || "";
                    document.getElementById('guardianContact').value = data.guardianContact || "";
                    document.getElementById('address').value = data.address || "";
                    
                    if(data.profilePic) {
                        document.getElementById('profileImg').src = data.profilePic;
                    } else {
                        document.getElementById('profileImg').src = `https://ui-avatars.com/api/?background=f1c40f&color=fff&bold=true&name=${encodeURIComponent(data.fullName || "S")}`;
                    }
                }
            } else {
                window.location.href = "../auth/login.html";
            }
        });

        // Cloudinary Upload
        document.getElementById('photoUpload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const icon = document.getElementById('cameraIcon');
            icon.className = "fas fa-spinner fa-spin";
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);

            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.secure_url) {
                    await updateDoc(doc(db, "users", auth.currentUser.uid), { profilePic: data.secure_url });
                    document.getElementById('profileImg').src = data.secure_url;
                    showToast("Profile photo updated!");
                } else {
                    throw new Error("Upload failed");
                }
            } catch (err) { 
                showToast("Upload failed. Please try again.", true);
            } finally { 
                icon.className = "fas fa-camera"; 
            }
        });

        // Save Profile
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            const originalHtml = btn.innerHTML;
            btn.disabled = true; 
            btn.innerHTML = '<i class="fas fa-sync fa-spin mr-2"></i> Updating...';
            try {
                await updateDoc(doc(db, "users", auth.currentUser.uid), {
                    fatherName: document.getElementById('fatherName').value,
                    motherName: document.getElementById('motherName').value,
                    dob: document.getElementById('dob').value,
                    qualification: document.getElementById('qualification').value,
                    whatsapp: document.getElementById('whatsapp').value,
                    guardianContact: document.getElementById('guardianContact').value,
                    address: document.getElementById('address').value
                });
                showToast("Profile updated successfully!");
            } catch (err) { 
                showToast("Update failed.", true);
            } finally { 
                btn.disabled = false; 
                btn.innerHTML = originalHtml;
            }
        });

        window.logout = async () => {
            if(confirm("Sign out from FyOrbit Student Portal?")) {
                await signOut(auth);
                window.location.href = "../index.html";
            }
        };

        // MOBILE SIDEBAR TOGGLE
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const openBtn = document.getElementById('openSidebar');
        const closeBtn = document.getElementById('closeSidebar');

        function toggleSidebar() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        if (openBtn) openBtn.addEventListener('click', toggleSidebar);
        if (closeBtn) closeBtn.addEventListener('click', toggleSidebar);
        if (overlay) overlay.addEventListener('click', toggleSidebar);
    </script>
</body>
</html>
