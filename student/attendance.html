<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Attendance | UCC Handwara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f1f5f9; }
        .sidebar-gradient { background: #1a2233; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .active-link { background: rgba(241, 196, 15, 0.1); border-left: 4px solid #f1c40f; color: #f1c40f !important; }
        .ucc-gold { color: #f1c40f; }

        /* Mobile sidebar – fixed positioning */
        @media (max-width: 768px) {
            .sidebar-mobile {
                position: fixed;
                top: 0;
                left: 0;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 1000;
                width: 280px;
                height: 100vh;
                overflow-y: auto;
            }
            .sidebar-mobile.active {
                transform: translateX(0);
            }
            .sidebar-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
                display: none;
            }
            .sidebar-overlay.active {
                display: block;
            }
        }
    </style>
</head>
<body class="flex min-h-screen">

    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <aside id="sidebar" class="sidebar-mobile w-72 sidebar-gradient text-white flex flex-col shadow-2xl shrink-0">
        <div class="p-8 text-center md:text-left flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-[#f1c40f] rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fas fa-university text-slate-900"></i>
                </div>
                <h1 class="text-xl font-black tracking-tighter uppercase text-white">UCC <span class="ucc-gold">Portal</span></h1>
            </div>
            <button id="closeSidebar" class="md:hidden text-white text-2xl"><i class="fas fa-times"></i></button>
        </div>
        
        <nav class="flex-grow px-4 mt-6 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-4 p-4 hover:bg-white/5 rounded-2xl transition text-slate-400 hover:text-white group">
                <i class="fas fa-th-large"></i> <span class="font-bold text-sm uppercase">Dashboard</span>
            </a>
            <a href="attendance.html" class="active-link flex items-center gap-4 p-4 rounded-2xl transition group">
                <i class="fas fa-calendar-check"></i> <span class="font-bold text-sm uppercase">Attendance</span>
            </a>
            <a href="profile.html" class="flex items-center gap-4 p-4 hover:bg-white/5 rounded-2xl transition text-slate-400 hover:text-white group">
                <i class="fas fa-user-circle"></i> <span class="font-bold text-sm uppercase">My Profile</span>
            </a>
        </nav>

        <div class="p-6 border-t border-white/5">
            <button onclick="logout()" class="w-full flex items-center gap-4 p-4 text-rose-500 font-black text-xs uppercase hover:bg-rose-500/10 rounded-2xl transition">
                <i class="fas fa-power-off"></i> <span>Sign Out</span>
            </button>
        </div>
    </aside>

    <main class="flex-grow p-4 md:p-10 overflow-x-hidden">
        
        <!-- Mobile header with sidebar toggle -->
        <div class="flex md:hidden justify-between items-center mb-6">
            <button id="openSidebar" class="text-slate-800 text-2xl p-2 bg-white rounded-xl shadow-sm"><i class="fas fa-bars"></i></button>
            <div class="w-10 h-10 bg-ucc-gold rounded-full flex items-center justify-center font-black">UCC</div>
        </div>

        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 md:mb-10 gap-6">
            <div>
                <h2 class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">My Attendance Record</h2>
                <p class="text-slate-500 font-medium text-sm md:text-base">Your daily presence history</p>
            </div>
            <div class="bg-white/80 backdrop-blur rounded-2xl px-5 py-2 md:px-6 md:py-3 shadow-sm">
                <span class="text-xs md:text-sm font-bold text-slate-600"><i class="fas fa-chart-line text-emerald-500 mr-2"></i> Overall: <span id="overallPercent">0</span>%</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 md:gap-6 mb-8 md:mb-10">
            <div class="glass-card p-5 md:p-6 flex items-center gap-4 md:gap-5 border-l-8 border-emerald-500">
                <h4 id="presentCount" class="text-2xl md:text-3xl font-black text-slate-800">0</h4>
                <p class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase tracking-widest">Present</p>
            </div>
            <div class="glass-card p-5 md:p-6 flex items-center gap-4 md:gap-5 border-l-8 border-rose-500">
                <h4 id="absentCount" class="text-2xl md:text-3xl font-black text-slate-800">0</h4>
                <p class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase tracking-widest">Absent</p>
            </div>
            <div class="glass-card p-5 md:p-6 flex items-center gap-4 md:gap-5 border-l-8 border-amber-500">
                <h4 id="leaveCount" class="text-2xl md:text-3xl font-black text-slate-800">0</h4>
                <p class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase tracking-widest">Leave</p>
            </div>
        </div>

        <div class="glass-card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-white border-b border-slate-100">
                        <tr class="text-[10px] font-black uppercase text-slate-400">
                            <th class="px-5 md:px-8 py-4 md:py-5">Date</th>
                            <th class="px-5 md:px-8 py-4 md:py-5">Status</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceTableBody">
                        <tr><td colspan="2" class="p-10 md:p-20 text-center animate-pulse">Loading your attendance...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, orderBy, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCny3ldh6tjeGLVQPgDQEHfDSFP--c6Hj4",
            authDomain: "trfasilyousf1.firebaseapp.com",
            projectId: "trfasilyousf1",
            storageBucket: "trfasilyousf1.firebasestorage.app",
            messagingSenderId: "158147210589",
            appId: "1:158147210589:web:1cfed2fc691fa4a13a0cb4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let redirectGuard = false;

        async function getUserWithRetry(uid, retries = 2) {
            for (let i = 0; i <= retries; i++) {
                try {
                    const snap = await getDoc(doc(db, "users", uid));
                    return snap;
                } catch (err) {
                    if (i === retries) throw err;
                    await new Promise(r => setTimeout(r, 800));
                }
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userDoc = await getUserWithRetry(user.uid, 2);
                    if (!userDoc.exists()) throw new Error("No user document");
                    loadAttendance(user.uid);
                } catch (err) {
                    console.error("Auth error:", err);
                    if (!redirectGuard) {
                        redirectGuard = true;
                        await signOut(auth);
                        window.location.href = "../auth/login.html";
                    }
                }
            } else {
                if (!redirectGuard) {
                    redirectGuard = true;
                    setTimeout(() => {
                        if (!auth.currentUser) window.location.href = "../auth/login.html";
                    }, 1200);
                }
            }
        });

        async function loadAttendance(uid) {
            try {
                const q = query(collection(db, "attendance"), where("studentId", "==", uid), orderBy("date", "desc"));
                const snapshot = await getDocs(q);
                const rows = [];
                let present = 0, absent = 0, leave = 0;

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const status = data.status.toLowerCase();
                    if (status === 'present') present++;
                    else if (status === 'absent') absent++;
                    else if (status === 'leave') leave++;

                    let badgeColor = '';
                    if (status === 'present') badgeColor = 'bg-emerald-100 text-emerald-700';
                    else if (status === 'absent') badgeColor = 'bg-rose-100 text-rose-700';
                    else badgeColor = 'bg-amber-100 text-amber-700';

                    rows.push(`
                        <tr class="border-b border-slate-100 hover:bg-slate-50">
                            <td class="px-5 md:px-8 py-3 md:py-4 font-mono text-xs md:text-sm">${data.date}</td>
                            <td class="px-5 md:px-8 py-3 md:py-4"><span class="px-3 md:px-4 py-1 rounded-full text-[10px] md:text-xs font-black uppercase ${badgeColor}">${data.status}</span></td>
                        </table>
                    `);
                });

                const total = present + absent + leave;
                const percent = total ? Math.round((present / total) * 100) : 0;

                document.getElementById('presentCount').innerText = present;
                document.getElementById('absentCount').innerText = absent;
                document.getElementById('leaveCount').innerText = leave;
                document.getElementById('overallPercent').innerText = percent;

                const tbody = document.getElementById('attendanceTableBody');
                if (rows.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="2" class="p-10 text-center text-slate-400">No attendance records found.</td></tr>`;
                } else {
                    tbody.innerHTML = rows.join('');
                }
            } catch (err) {
                console.error("Firestore error:", err);
                document.getElementById('attendanceTableBody').innerHTML = 
                    `<tr><td colspan="2" class="p-10 text-center text-rose-500">⚠️ Failed to load attendance. Please refresh the page.</td></tr>`;
            }
        }

        window.logout = async () => {
            if(confirm("Sign out of UCC Portal?")) {
                await signOut(auth);
                window.location.href = "../index.html";
            }
        };

        // MOBILE SIDEBAR TOGGLE
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const openBtn = document.getElementById('openSidebar');
        const closeBtn = document.getElementById('closeSidebar');

        function toggleSidebar() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        if (openBtn) openBtn.addEventListener('click', toggleSidebar);
        if (closeBtn) closeBtn.addEventListener('click', toggleSidebar);
        if (overlay) overlay.addEventListener('click', toggleSidebar);
    </script>
</body>
</html>
