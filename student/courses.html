<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Courses | UCC Handwara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f1f5f9; }
        .sidebar-gradient { background: #1a2233; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .stat-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .stat-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .active-link { background: rgba(241, 196, 15, 0.1); border-left: 4px solid #f1c40f; color: #f1c40f !important; }
        .ucc-gold { color: #f1c40f; }
        .course-card { transition: all 0.2s ease; }
        .course-card:hover { transform: translateY(-4px); }

        /* Mobile sidebar – fixed positioning */
        @media (max-width: 768px) {
            .sidebar-mobile {
                position: fixed;
                top: 0;
                left: 0;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 1000;
                width: 280px;
                height: 100vh;
                overflow-y: auto;
            }
            .sidebar-mobile.active {
                transform: translateX(0);
            }
            .sidebar-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
                display: none;
            }
            .sidebar-overlay.active {
                display: block;
            }
        }
    </style>
</head>
<body class="flex min-h-screen">

    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <!-- SIDEBAR (now responsive) -->
    <aside id="sidebar" class="sidebar-mobile w-72 sidebar-gradient text-white flex flex-col shadow-2xl shrink-0">
        <div class="p-8 text-center md:text-left flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-[#f1c40f] rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fas fa-university text-slate-900"></i>
                </div>
                <h1 class="text-xl font-black tracking-tighter uppercase text-white">UCC <span class="ucc-gold">Portal</span></h1>
            </div>
            <button id="closeSidebar" class="md:hidden text-white text-2xl"><i class="fas fa-times"></i></button>
        </div>
        
        <nav class="flex-grow px-4 mt-6 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-4 p-4 hover:bg-white/5 rounded-2xl transition text-slate-400 hover:text-white group">
                <i class="fas fa-th-large"></i> <span class="font-bold text-sm uppercase">Dashboard</span>
            </a>
            <a href="courses.html" class="active-link flex items-center gap-4 p-4 rounded-2xl transition group">
                <i class="fas fa-book-open"></i> <span class="font-bold text-sm uppercase">My Courses</span>
            </a>
            <a href="attendance.html" class="flex items-center gap-4 p-4 hover:bg-white/5 rounded-2xl transition text-slate-400 hover:text-white group">
                <i class="fas fa-calendar-check"></i> <span class="font-bold text-sm uppercase">Attendance</span>
            </a>
            <a href="profile.html" class="flex items-center gap-4 p-4 hover:bg-white/5 rounded-2xl transition text-slate-400 hover:text-white group">
                <i class="fas fa-user-circle"></i> <span class="font-bold text-sm uppercase">My Profile</span>
            </a>
        </nav>

        <div class="p-6 border-t border-white/5">
            <button onclick="logout()" class="w-full flex items-center gap-4 p-4 text-rose-500 font-black text-xs uppercase hover:bg-rose-500/10 rounded-2xl transition">
                <i class="fas fa-power-off"></i> <span>Sign Out</span>
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-grow p-4 md:p-12 overflow-x-hidden">
        
        <!-- Mobile header with sidebar toggle -->
        <div class="flex md:hidden justify-between items-center mb-6">
            <button id="openSidebar" class="text-slate-800 text-2xl p-2 bg-white rounded-xl shadow-sm"><i class="fas fa-bars"></i></button>
            <div class="w-10 h-10 bg-ucc-gold rounded-full flex items-center justify-center font-black">UCC</div>
        </div>

        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 md:mb-12 gap-6">
            <div>
                <h2 class="text-2xl md:text-4xl font-black text-slate-800 tracking-tight">
                    My <span class="ucc-gold">Courses</span>
                </h2>
                <p class="text-slate-500 font-medium mt-1 text-sm md:text-base">Your enrolled subjects for this semester</p>
            </div>
            <div class="glass-card px-5 py-2 md:px-6 md:py-3 rounded-2xl shadow-sm">
                <span class="text-xs md:text-sm font-bold text-slate-600"><i class="fas fa-chalkboard-user text-emerald-500 mr-2"></i> <span id="courseCount">0</span> Courses</span>
            </div>
        </header>

        <!-- Course Grid -->
        <div id="coursesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
            <div class="col-span-full text-center py-20">
                <i class="fas fa-spinner fa-pulse text-4xl text-ucc-gold"></i>
                <p class="mt-4 text-slate-500">Loading your courses...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, getDocs, query, where, documentId } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCny3ldh6tjeGLVQPgDQEHfDSFP--c6Hj4",
            authDomain: "trfasilyousf1.firebaseapp.com",
            projectId: "trfasilyousf1",
            storageBucket: "trfasilyousf1.firebasestorage.app",
            messagingSenderId: "158147210589",
            appId: "1:158147210589:web:1cfed2fc691fa4a13a0cb4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let redirectGuard = false;

        // Helper: fetch user doc with retry
        async function getUserWithRetry(uid, retries = 2) {
            for (let i = 0; i <= retries; i++) {
                try {
                    const snap = await getDoc(doc(db, "users", uid));
                    return snap;
                } catch (err) {
                    if (i === retries) throw err;
                    await new Promise(r => setTimeout(r, 800));
                }
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userDoc = await getUserWithRetry(user.uid, 2);
                    if (!userDoc.exists()) throw new Error("User document missing");
                    
                    const userData = userDoc.data();
                    const enrolledCourseIds = userData.enrolledCourses || [];
                    
                    if (enrolledCourseIds.length === 0) {
                        renderNoCourses();
                    } else {
                        await loadCourses(enrolledCourseIds);
                    }
                } catch (err) {
                    console.error("Auth error:", err);
                    if (!redirectGuard) {
                        redirectGuard = true;
                        await signOut(auth);
                        window.location.href = "../auth/login.html";
                    }
                }
            } else {
                if (!redirectGuard) {
                    redirectGuard = true;
                    setTimeout(() => {
                        if (!auth.currentUser) window.location.href = "../auth/login.html";
                    }, 1200);
                }
            }
        });

        async function loadCourses(courseIds) {
            try {
                const coursesRef = collection(db, "courses");
                const q = query(coursesRef, where(documentId(), "in", courseIds));
                const snapshot = await getDocs(q);
                
                const courses = [];
                snapshot.forEach(doc => {
                    courses.push({ id: doc.id, ...doc.data() });
                });
                
                if (courses.length === 0) {
                    renderNoCourses();
                } else {
                    renderCourseCards(courses);
                    document.getElementById('courseCount').innerText = courses.length;
                }
            } catch (err) {
                console.error("Error loading courses:", err);
                document.getElementById('coursesContainer').innerHTML = `
                    <div class="col-span-full text-center py-20">
                        <i class="fas fa-exclamation-triangle text-4xl text-rose-500"></i>
                        <p class="mt-4 text-slate-600">Failed to load courses. Please refresh.</p>
                    </div>
                `;
            }
        }

        function renderCourseCards(courses) {
            const container = document.getElementById('coursesContainer');
            container.innerHTML = courses.map(course => `
                <div class="glass-card rounded-2xl md:rounded-3xl overflow-hidden shadow-md course-card">
                    <div class="h-24 md:h-32 bg-gradient-to-r from-slate-800 to-slate-700 flex items-center justify-center">
                        <i class="fas fa-graduation-cap text-4xl md:text-5xl text-[#f1c40f]/80"></i>
                    </div>
                    <div class="p-4 md:p-6">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-lg md:text-xl font-black text-slate-800">${escapeHtml(course.courseName || 'Unnamed Course')}</h3>
                                <p class="text-[9px] md:text-[10px] font-mono font-bold text-slate-400 mt-1">${escapeHtml(course.courseCode || 'CODE')}</p>
                            </div>
                            <span class="bg-emerald-100 text-emerald-700 text-[8px] md:text-[9px] font-black px-2 md:px-3 py-1 rounded-full uppercase">${course.credits || 3} Credits</span>
                        </div>
                        <div class="mt-3 md:mt-4 space-y-1 md:space-y-2 text-xs md:text-sm">
                            <div class="flex items-center gap-2 text-slate-600">
                                <i class="fas fa-chalkboard-user w-4 md:w-5 text-[#f1c40f]"></i>
                                <span><strong class="font-semibold">Tutor:</strong> ${escapeHtml(course.instructor || 'Not assigned')}</span>
                            </div>
                            <div class="flex items-center gap-2 text-slate-600">
                                <i class="fas fa-globe w-4 md:w-5 text-[#f1c40f]"></i>
                                <span><strong class="font-semibold">Mode:</strong> ${escapeHtml(course.mode || course.delivery || 'Online')}</span>
                            </div>
                            <div class="flex items-center gap-2 text-slate-600">
                                <i class="fas fa-door-open w-4 md:w-5 text-[#f1c40f]"></i>
                                <span><strong class="font-semibold">Platform/Room:</strong> ${escapeHtml(course.room || course.platform || 'Google Meet')}</span>
                            </div>
                            ${course.schedule ? `
                            <div class="flex items-center gap-2 text-slate-600">
                                <i class="fas fa-calendar-alt w-4 md:w-5 text-[#f1c40f]"></i>
                                <span><strong class="font-semibold">Schedule:</strong> ${escapeHtml(course.schedule)}</span>
                            </div>
                            ` : ''}
                        </div>
                        <div class="mt-4 md:mt-6 pt-3 md:pt-4 border-t border-slate-100">
                            <a href="#" class="text-[10px] md:text-[11px] font-black uppercase tracking-wider text-emerald-600 hover:text-emerald-800 transition">View Details <i class="fas fa-arrow-right ml-1"></i></a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderNoCourses() {
            const container = document.getElementById('coursesContainer');
            container.innerHTML = `
                <div class="col-span-full text-center py-20">
                    <i class="fas fa-book-open text-5xl md:text-6xl text-slate-300 mb-4"></i>
                    <h3 class="text-xl md:text-2xl font-bold text-slate-600">No Courses Enrolled</h3>
                    <p class="text-slate-400 mt-2 text-sm md:text-base">You haven't registered for any courses this semester.</p>
                    <button onclick="location.href='register.html'" class="mt-6 bg-[#f1c40f] text-slate-900 px-5 py-2 md:px-6 md:py-3 rounded-2xl font-black text-[10px] md:text-xs uppercase tracking-wider hover:bg-yellow-400 transition">Register Now</button>
                </div>
            `;
            document.getElementById('courseCount').innerText = "0";
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        window.logout = async () => {
            if(confirm("Sign out of UCC Portal?")) {
                await signOut(auth);
                window.location.href = "../index.html";
            }
        };

        // MOBILE SIDEBAR TOGGLE
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const openBtn = document.getElementById('openSidebar');
        const closeBtn = document.getElementById('closeSidebar');

        function toggleSidebar() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        if (openBtn) openBtn.addEventListener('click', toggleSidebar);
        if (closeBtn) closeBtn.addEventListener('click', toggleSidebar);
        if (overlay) overlay.addEventListener('click', toggleSidebar);
    </script>
</body>
</html>
