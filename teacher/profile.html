<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Profile | FyOrbit Teacher</title>
    <link rel="shortcut icon" href="../assets/img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --solid-blue: #1e3a8a;
            --solid-blue-light: #2563eb;
            --accent-yellow: #eab308;
            --pure-white: #ffffff;
            --gray-bg: #f4f7fc;
        }
        * { font-family: 'Outfit', sans-serif; }
        body { background: var(--gray-bg); scroll-behavior: smooth; }
        
        .sidebar-solid {
            background-color: var(--solid-blue);
            color: white;
        }
        .sidebar-solid .sidebar-link {
            transition: all 0.2s;
            border-left: 3px solid transparent;
            font-weight: 600;
            color: #e0e7ff;
            margin: 4px 0;
        }
        .sidebar-solid .sidebar-link i { color: #bfdbfe; width: 24px; }
        .sidebar-solid .sidebar-link:hover {
            background: rgba(255, 255, 255, 0.15);
            border-left-color: var(--accent-yellow);
            color: white;
        }
        .sidebar-solid .sidebar-link.active {
            background: rgba(255, 255, 255, 0.2);
            border-left-color: var(--accent-yellow);
            color: white;
            font-weight: 700;
        }
        .sidebar-solid .sidebar-link.active i { color: var(--accent-yellow); }
        
        .avatar-gradient {
            background: linear-gradient(145deg, var(--solid-blue-light), var(--accent-yellow));
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }
        .input-elegant {
            transition: all 0.2s ease;
            background: white;
            border: 1.5px solid #e2e8f0;
            width: 100%;
            padding: 0.85rem 1.25rem;
            border-radius: 1.25rem;
            font-weight: 500;
            color: #0f172a;
            font-size: 0.95rem;
        }
        .input-elegant:focus {
            border-color: var(--accent-yellow);
            box-shadow: 0 0 0 4px rgba(234, 179, 8, 0.2);
            transform: scale(1.01);
            outline: none;
        }
        .stat-badge {
            background: linear-gradient(120deg, #eff6ff, #e0f2fe);
            border-left: 3px solid var(--accent-yellow);
        }
        .upload-overlay {
            transition: all 0.2s ease;
        }
        .upload-overlay:hover {
            background: var(--accent-yellow);
            transform: scale(1.08);
        }
        @media (max-width: 768px) {
            .sidebar-mobile {
                position: fixed;
                top: 0;
                left: 0;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 1000;
                width: 280px;
                height: 100vh;
                overflow-y: auto;
            }
            .sidebar-mobile.active {
                transform: translateX(0);
            }
            .sidebar-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
                display: none;
            }
            .sidebar-overlay.active {
                display: block;
            }
        }
    </style>
</head>
<body class="flex min-h-screen">

    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <!-- Sidebar - Teacher Portal (Blue/Yellow) -->
    <aside id="sidebar" class="sidebar-mobile w-72 sidebar-solid text-white flex flex-col shadow-2xl shrink-0">
        <div class="p-8 text-center md:text-left flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-white/20 flex items-center justify-center shadow-md">
                    <img src="../assets/img/slogo.png" alt="FyOrbit Logo" class="w-full h-full object-cover rounded-xl">
                </div>
                <h1 class="text-xl font-black tracking-tighter uppercase text-white">Fy<span class="text-yellow-300">Orbit</span></h1>
            </div>
            <button id="closeSidebar" class="md:hidden text-white text-2xl"><i class="fas fa-times"></i></button>
        </div>
        
        <nav class="flex-grow px-4 mt-6 space-y-1">
            <a href="dashboard.html" class="sidebar-link flex items-center gap-4 p-4 rounded-xl transition group">
                <i class="fas fa-tachometer-alt"></i> <span class="font-bold text-sm uppercase">Dashboard</span>
            </a>
            <a href="students.html" class="sidebar-link flex items-center gap-4 p-4 rounded-xl transition group">
                <i class="fas fa-users"></i> <span class="font-bold text-sm uppercase">My Students</span>
            </a>
            <a href="classes.html" class="sidebar-link flex items-center gap-4 p-4 rounded-xl transition group">
                <i class="fas fa-chalkboard"></i> <span class="font-bold text-sm uppercase">Classes</span>
            </a>
            <a href="attendance.html" class="sidebar-link flex items-center gap-4 p-4 rounded-xl transition group">
                <i class="fas fa-calendar-check"></i> <span class="font-bold text-sm uppercase">Attendance</span>
            </a>
            <a href="assignments.html" class="sidebar-link flex items-center gap-4 p-4 rounded-xl transition group">
                <i class="fas fa-tasks"></i> <span class="font-bold text-sm uppercase">Assignments</span>
            </a>
            <a href="profile.html" class="sidebar-link active flex items-center gap-4 p-4 rounded-xl transition group">
                <i class="fas fa-user-circle"></i> <span class="font-bold text-sm uppercase">Profile</span>
            </a>
        </nav>

        <div class="p-6 border-t border-white/20">
            <button onclick="logout()" class="w-full flex items-center gap-4 p-4 text-rose-300 hover:bg-rose-500/20 rounded-xl transition font-bold text-xs uppercase">
                <i class="fas fa-power-off"></i> <span>Sign Out</span>
            </button>
        </div>
    </aside>

    <main class="flex-grow p-4 md:p-10 overflow-x-hidden">
        
        <!-- Mobile header with sidebar toggle -->
        <div class="flex md:hidden justify-between items-center mb-6">
            <button id="openSidebar" class="text-slate-800 text-2xl p-2 bg-white rounded-xl shadow-sm"><i class="fas fa-bars"></i></button>
            <div class="w-10 h-10 bg-avatar-gradient rounded-full flex items-center justify-center font-black text-white">FY</div>
        </div>

        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-6">
            <div>
                <h2 class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">My Profile</h2>
                <p class="text-slate-500 font-medium text-sm">Manage your personal & professional information</p>
            </div>
            <div class="glass-card rounded-2xl px-5 py-3 shadow-sm flex items-center gap-4 border border-white/60">
                <div class="relative group">
                    <img id="profileImg" src="https://via.placeholder.com/100" class="w-14 h-14 rounded-2xl object-cover border-2 border-white shadow-md bg-slate-100">
                    <label for="photoUpload" class="upload-overlay absolute -bottom-1 -right-1 bg-slate-800 text-yellow-500 w-6 h-6 rounded-xl flex items-center justify-center cursor-pointer text-[9px] border-2 border-white shadow-lg hover:bg-yellow-500 hover:text-slate-900 transition-all duration-200">
                        <i class="fas fa-camera" id="cameraIcon"></i>
                        <input type="file" id="photoUpload" class="hidden" accept="image/jpeg,image/png,image/webp">
                    </label>
                </div>
                <div>
                    <h4 id="displayName" class="font-black text-slate-800 text-base tracking-tight leading-tight">Loading...</h4>
                    <div class="flex items-center gap-2 mt-1">
                        <i class="fas fa-id-card text-[10px] text-slate-400"></i>
                        <p id="teacherId" class="text-[10px] font-bold text-slate-500 uppercase tracking-wide">FY-XXXX</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Stats Cards (Teacher specific) -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
            <div class="stat-badge rounded-2xl p-4 bg-white/70 shadow-sm border border-white/50 flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center"><i class="fas fa-envelope text-blue-600 text-lg"></i></div>
                <div><p class="text-[9px] font-black text-slate-400 uppercase">Email</p><p id="statEmail" class="font-bold text-slate-700 text-xs truncate max-w-[150px]">---</p></div>
            </div>
            <div class="stat-badge rounded-2xl p-4 bg-white/70 shadow-sm border border-white/50 flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center"><i class="fas fa-calendar-alt text-blue-600 text-lg"></i></div>
                <div><p class="text-[9px] font-black text-slate-400 uppercase">Joined</p><p id="joinedSince" class="font-bold text-slate-700 text-sm">---</p></div>
            </div>
            <div class="stat-badge rounded-2xl p-4 bg-white/70 shadow-sm border border-white/50 flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center"><i class="fas fa-chalkboard-user text-blue-600 text-lg"></i></div>
                <div><p class="text-[9px] font-black text-slate-400 uppercase">Department</p><p id="statDepartment" class="font-bold text-slate-700 text-sm">---</p></div>
            </div>
        </div>

        <!-- Profile Form -->
        <div class="glass-card rounded-[2rem] p-6 md:p-8 shadow-xl">
            <form id="profileForm" class="space-y-8">
                <!-- Personal Information Section -->
                <div class="flex items-center gap-4 border-b border-slate-100 pb-4">
                    <div class="w-8 h-8 rounded-xl bg-slate-100 flex items-center justify-center"><i class="fas fa-user text-slate-600 text-sm"></i></div>
                    <h3 class="text-[11px] font-black uppercase tracking-[0.2em] text-slate-500">Personal Information</h3>
                    <div class="h-px flex-grow bg-gradient-to-r from-slate-200 to-transparent"></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-wider text-slate-500">Full Name</label>
                        <input type="text" id="fullName" class="input-elegant" readonly disabled style="background:#f8fafc; cursor:not-allowed;">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-wider text-slate-500">Email Address</label>
                        <input type="email" id="email" class="input-elegant" readonly disabled style="background:#f8fafc; cursor:not-allowed;">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-wider text-slate-500">Employee ID</label>
                        <input type="text" id="employeeId" class="input-elegant" readonly disabled style="background:#f8fafc; cursor:not-allowed;">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-wider text-slate-500">Department</label>
                        <select id="department" class="input-elegant bg-white">
                            <option value="">Select Department</option>
                            <option>Teaching</option>
                            <option>Administration</option>
                            <option>Accounts</option>
                            <option>Library</option>
                            <option>IT</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-wider text-slate-500">Designation</label>
                        <input type="text" id="designation" class="input-elegant" placeholder="e.g., Senior Teacher, Coordinator">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-wider text-slate-500">Joining Date</label>
                        <input type="date" id="joiningDate" class="input-elegant">
                    </div>
                    <div class="md:col-span-2">
                        <label class="text-[10px] font-black uppercase tracking-wider text-slate-500">Subjects Handled</label>
                        <input type="text" id="subjects" class="input-elegant" placeholder="e.g., Mathematics, Science, English">
                    </div>
                </div>

                <!-- Professional / Institute Section -->
                <div class="flex items-center gap-4 border-b border-slate-100 pb-4 pt-4">
                    <div class="w-8 h-8 rounded-xl bg-slate-100 flex items-center justify-center"><i class="fas fa-building text-slate-600 text-sm"></i></div>
                    <h3 class="text-[11px] font-black uppercase tracking-[0.2em] text-slate-500">Institute Details</h3>
                    <div class="h-px flex-grow bg-gradient-to-r from-slate-200 to-transparent"></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-wider text-slate-500">Institute Code</label>
                        <input type="text" id="instituteCode" class="input-elegant" readonly disabled style="background:#f8fafc; cursor:not-allowed;">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-wider text-slate-500">Qualification</label>
                        <select id="qualification" class="input-elegant bg-white">
                            <option value="">Select Highest Qualification</option>
                            <option>Bachelor's Degree</option>
                            <option>Master's Degree</option>
                            <option>PhD</option>
                            <option>Diploma</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label class="text-[10px] font-black uppercase tracking-wider text-slate-500">Phone Number</label>
                        <input type="tel" id="phone" class="input-elegant" placeholder="+91 98765 43210">
                    </div>
                    <div class="md:col-span-2">
                        <label class="text-[10px] font-black uppercase tracking-wider text-slate-500">Address</label>
                        <textarea id="address" rows="2" class="input-elegant resize-none" placeholder="Residential address"></textarea>
                    </div>
                </div>

                <button type="submit" id="saveBtn" class="group w-full py-4 bg-blue-800 text-white font-black uppercase tracking-[0.15em] rounded-2xl shadow-lg hover:bg-yellow-500 hover:text-slate-900 transition-all duration-300 flex items-center justify-center gap-3 text-sm">
                    <span>Update Profile</span>
                    <i class="fas fa-save group-hover:translate-y-[-2px] transition-transform"></i>
                </button>
            </form>
        </div>
    </main>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, onAuthStateChanged, signOut, updateProfile } from "firebase/auth";
        import { getFirestore, doc, getDoc, updateDoc } from "firebase/firestore";

        const firebaseConfig = {
            apiKey: "AIzaSyCny3ldh6tjeGLVQPgDQEHfDSFP--c6Hj4",
            authDomain: "trfasilyousf1.firebaseapp.com",
            projectId: "trfasilyousf1",
            storageBucket: "trfasilyousf1.firebasestorage.app",
            messagingSenderId: "158147210589",
            appId: "1:158147210589:web:1cfed2fc691fa4a13a0cb4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Cloudinary Settings
        const CLOUD_NAME = "dholrawub";
        const UPLOAD_PRESET = "portal_profile";

        let currentUser = null;
        let teacherData = null;

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-6 right-6 px-5 py-3 rounded-xl shadow-2xl z-[200] text-sm font-bold backdrop-blur-md ${isError ? 'bg-rose-500 text-white' : 'bg-emerald-500 text-slate-900'}`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'} mr-2"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Cloudinary Upload
        async function uploadToCloudinary(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (!data.secure_url) throw new Error(data.error?.message || "Upload failed");
                return data.secure_url;
            } catch (err) {
                console.error("Cloudinary error:", err);
                throw err;
            }
        }

        // Load teacher data
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "../auth/login.html";
                return;
            }
            currentUser = user;
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (!userDoc.exists()) {
                showToast("User profile not found.", true);
                return;
            }
            teacherData = userDoc.data();
            // Allow both 'staff' and 'teacher' roles
            if (teacherData.role !== 'staff' && teacherData.role !== 'teacher') {
                showToast("Access denied. Teacher portal only.", true);
                await signOut(auth);
                window.location.href = "../index.html";
                return;
            }

            // Populate UI
            document.getElementById('displayName').innerText = teacherData.fullName || "Teacher";
            document.getElementById('fullName').value = teacherData.fullName || "";
            document.getElementById('email').value = teacherData.email || "";
            document.getElementById('teacherId').innerText = `FY-${user.uid.slice(-6).toUpperCase()}`;
            document.getElementById('statEmail').innerText = teacherData.email || "---";
            document.getElementById('joinedSince').innerText = teacherData.createdAt ? new Date(teacherData.createdAt).toLocaleDateString('en-IN') : "2025";
            document.getElementById('statDepartment').innerText = teacherData.department || "Not set";
            
            // Teacher-specific fields
            document.getElementById('employeeId').value = teacherData.employeeId || "";
            document.getElementById('department').value = teacherData.department || "";
            document.getElementById('designation').value = teacherData.designation || "";
            document.getElementById('joiningDate').value = teacherData.joiningDate || "";
            document.getElementById('subjects').value = teacherData.subjects || "";
            document.getElementById('instituteCode').value = teacherData.instituteCode || "";
            document.getElementById('qualification').value = teacherData.qualification || "";
            document.getElementById('phone').value = teacherData.phone || "";
            document.getElementById('address').value = teacherData.address || "";
            
            // Avatar
            if (teacherData.profilePic) {
                document.getElementById('profileImg').src = teacherData.profilePic;
            } else {
                const fallbackUrl = `https://ui-avatars.com/api/?background=2563eb&color=fff&bold=true&name=${encodeURIComponent(teacherData.fullName || "T")}&size=100&rounded=true`;
                document.getElementById('profileImg').src = fallbackUrl;
            }
        });

        // Photo upload handler
        const photoInput = document.getElementById('photoUpload');
        if (photoInput) {
            photoInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const icon = document.getElementById('cameraIcon');
                icon.className = "fas fa-spinner fa-spin";
                try {
                    const imageUrl = await uploadToCloudinary(file);
                    await updateDoc(doc(db, "users", auth.currentUser.uid), { profilePic: imageUrl });
                    await updateProfile(auth.currentUser, { photoURL: imageUrl });
                    document.getElementById('profileImg').src = imageUrl;
                    showToast("Profile photo updated!");
                } catch (err) {
                    showToast("Upload failed: " + err.message, true);
                } finally {
                    icon.className = "fas fa-camera";
                }
                photoInput.value = ''; // allow re-upload same file
            });
        }

        // Save profile changes
        const profileForm = document.getElementById('profileForm');
        if (profileForm) {
            profileForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('saveBtn');
                const originalHtml = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-sync fa-spin mr-2"></i> Updating...';
                
                const updateData = {
                    department: document.getElementById('department').value,
                    designation: document.getElementById('designation').value,
                    joiningDate: document.getElementById('joiningDate').value,
                    subjects: document.getElementById('subjects').value,
                    qualification: document.getElementById('qualification').value,
                    phone: document.getElementById('phone').value,
                    address: document.getElementById('address').value
                };
                
                try {
                    await updateDoc(doc(db, "users", auth.currentUser.uid), updateData);
                    showToast("Profile updated successfully!");
                    // Refresh stat badge for department
                    document.getElementById('statDepartment').innerText = updateData.department || "Not set";
                } catch (err) {
                    showToast("Update failed: " + err.message, true);
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = originalHtml;
                }
            });
        }

        window.logout = async () => {
            if (confirm("Sign out from FyOrbit Teacher Portal?")) {
                await signOut(auth);
                window.location.href = "../index.html";
            }
        };

        // Mobile sidebar toggle
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const openBtn = document.getElementById('openSidebar');
        const closeBtn = document.getElementById('closeSidebar');

        function toggleSidebar() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }
        if (openBtn) openBtn.addEventListener('click', toggleSidebar);
        if (closeBtn) closeBtn.addEventListener('click', toggleSidebar);
        if (overlay) overlay.addEventListener('click', toggleSidebar);
    </script>
</body>
</html>
