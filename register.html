<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Tr Fasil Yousf</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .bg-animate {
            background: linear-gradient(-45deg, #2c3e50, #27ae60, #2c3e50, #f1c40f);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .input-focus:focus {
            border-color: #27ae60;
            box-shadow: 0 0 0 4px rgba(39, 174, 96, 0.1);
        }
        .loader {
            border-top-color: #f1c40f;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-animate min-h-screen flex items-center justify-center p-6 py-12">

    <a href="login.html" class="absolute top-8 left-8 text-white/80 hover:text-white flex items-center gap-2 font-semibold transition">
        <i class="fas fa-arrow-left"></i> Back to Login
    </a>

    <div class="w-full max-w-lg">
        <div class="text-center mb-8">
            <div class="inline-flex w-16 h-16 bg-[#f1c40f] rounded-2xl items-center justify-center shadow-xl mb-4 transform rotate-6">
                <i class="fas fa-user-plus text-[#2c3e50] text-3xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-white tracking-tight">Create <span class="text-[#f1c40f]">Account</span></h1>
            <p class="text-white/60 text-sm mt-2">Join United Community College Handwara today</p>
        </div>

        <div class="glass-container rounded-[2.5rem] p-8 md:p-12 shadow-2xl">
            <form id="registerForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <div class="md:col-span-2">
                    <label class="block text-xs font-black uppercase tracking-widest text-slate-500 mb-2 ml-1">Full Name</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text" id="regName" placeholder="Fasil Yousf" required
                            class="w-full pl-11 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none input-focus transition-all text-slate-700">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-slate-500 mb-2 ml-1">Email Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" id="regEmail" placeholder="mail@example.com" required
                            class="w-full pl-11 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none input-focus transition-all text-slate-700">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-slate-500 mb-2 ml-1">Phone Number</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i class="fas fa-phone"></i>
                        </span>
                        <input type="tel" id="regPhone" placeholder="7006XXXXXX" required
                            class="w-full pl-11 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none input-focus transition-all text-slate-700">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-slate-500 mb-2 ml-1">Create Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="regPass" placeholder="••••••••" required
                            class="w-full pl-11 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none input-focus transition-all text-slate-700">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-slate-500 mb-2 ml-1">Confirm Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i class="fas fa-check-double"></i>
                        </span>
                        <input type="password" id="regConfirmPass" placeholder="••••••••" required
                            class="w-full pl-11 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none input-focus transition-all text-slate-700">
                    </div>
                </div>

                <div class="md:col-span-2 flex items-start gap-3 ml-1">
                    <input type="checkbox" id="terms" required class="mt-1 w-4 h-4 rounded border-slate-300 text-[#27ae60] focus:ring-[#27ae60]">
                    <label for="terms" class="text-xs font-medium text-slate-500 leading-relaxed">
                        I agree to the <a href="#" class="text-[#3498db] font-bold">Privacy Policy</a> and understand that my data will be used for educational purposes at UCC.
                    </label>
                </div>

                <button type="submit" id="submitBtn"
                    class="md:col-span-2 w-full py-4 bg-[#2c3e50] text-white font-bold rounded-2xl shadow-xl hover:bg-[#1a252f] transform active:scale-95 transition-all flex items-center justify-center gap-3 uppercase tracking-[0.2em] text-sm">
                    <span id="btnText">Create My Account</span>
                    <i class="fas fa-arrow-right" id="btnIcon"></i>
                    <div id="btnLoader" class="loader hidden ease-linear rounded-full border-2 border-t-2 border-gray-200 h-5 w-5"></div>
                </button>
            </form>

            <div class="mt-10 text-center border-t border-slate-100 pt-8">
                <p class="text-slate-500 font-medium text-sm">
                    Already a member? 
                    <a href="login.html" class="text-[#3498db] font-extrabold hover:underline ml-1 uppercase">Login here</a>
                </p>
            </div>
        </div>

        <p class="text-center text-white/40 text-[10px] mt-8 font-bold uppercase tracking-[0.3em]">
            Digital Campus Portal | Handwara 2026
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCny3ldh6tjeGLVQPgDQEHfDSFP--c6Hj4",
            authDomain: "trfasilyousf1.firebaseapp.com",
            projectId: "trfasilyousf1",
            storageBucket: "trfasilyousf1.firebasestorage.app",
            messagingSenderId: "158147210589",
            appId: "1:158147210589:web:1cfed2fc691fa4a13a0cb4",
            measurementId: "G-JJ5GE7HS02"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const form = document.getElementById('registerForm');
        const btn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const btnLoader = document.getElementById('btnLoader');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPass').value;
            const confirmPass = document.getElementById('regConfirmPass').value;

            // Basic Validation
            if (password !== confirmPass) {
                alert("Passwords do not match!");
                return;
            }

            // Loading State
            btn.disabled = true;
            btnText.innerText = "Processing...";
            btnIcon.classList.add('hidden');
            btnLoader.classList.remove('hidden');

            try {
                // 1. Create User in Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Store Additional Info in Firestore
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    fullName: name,
                    email: email,
                    phoneNumber: phone,
                    role: "student",
                    createdAt: new Date().toISOString()
                });

                alert("Registration Successful! Welcome to UCC.");
                window.location.href = "login.html"; // Redirect to login

            } catch (error) {
                console.error("Error during registration:", error.code);
                alert("Error: " + error.message);
            } finally {
                // Reset Button
                btn.disabled = false;
                btnText.innerText = "Create My Account";
                btnIcon.classList.remove('hidden');
                btnLoader.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
