<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>eDairy | UCC Admin Nexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Outfit', sans-serif; }
        body { background: #0b1120; color: #ecf3f2; }
        .glass-panel { background: rgba(15, 23, 42, 0.68); backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.06); }
        .sidebar-glass { background: linear-gradient(165deg, #0f172a 0%, #0a0f1c 100%); backdrop-filter: blur(4px); border-right: 1px solid rgba(241,196,15,0.12); }
        .active-link { background: rgba(241,196,15,0.1); border-left: 4px solid #f1c40f; color: #f1c40f !important; }
        .diary-card { transition: all 0.2s ease; }
        .diary-card:hover { transform: translateY(-3px); background: rgba(241,196,15,0.02); border-color: rgba(241,196,15,0.2); }
        .skeleton { background: linear-gradient(90deg, #1e293b 25%, #2d3a4e 50%, #1e293b 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .modal-backdrop { animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-card { animation: slideUp 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #f1c40f; border-radius: 10px; }
        @media (max-width: 640px) {
            .diary-card .flex { flex-direction: column; align-items: flex-start !important; }
            .diary-card .flex .flex.gap-2 { align-self: flex-end; margin-top: 0.5rem; }
        }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- Mobile sidebar overlay -->
    <div id="mobileSidebarOverlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-40 hidden lg:hidden transition-all duration-300"></div>
    
    <!-- Sidebar - identical to main dashboard -->
    <aside id="mainSidebar" class="fixed left-0 top-0 lg:relative lg:flex flex-col w-72 sidebar-glass z-50 h-screen transition-all duration-300 transform -translate-x-full lg:translate-x-0 shadow-2xl">
        <div class="p-6 border-b border-white/5">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-gradient-to-br from-[#f1c40f] to-orange-500 rounded-2xl flex items-center justify-center shadow-xl">
                    <i class="fas fa-crown text-slate-900 text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-tight text-white">UCC <span class="text-[#f1c40f]">ADMIN</span></h1>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Control Core</p>
                </div>
            </div>
        </div>

        <nav class="flex-1 p-5 space-y-2 mt-4">
            <!-- Directory (Dashboard) -->
            <a href="dashboard.html" class="w-full flex items-center gap-4 px-5 py-3.5 text-slate-300 hover:bg-white/5 rounded-xl transition font-semibold text-sm uppercase">
                <i class="fas fa-users text-lg w-6"></i> Directory
            </a>
            <!-- My Profile -->
            <a href="profile.html" class="w-full flex items-center gap-4 px-5 py-3.5 text-slate-300 hover:bg-white/5 rounded-xl transition font-semibold text-sm uppercase">
                <i class="fas fa-user-circle w-6"></i> My Profile
            </a>
            <!-- eDairy - Active -->
            <a href="edairy.html" class="active-link w-full flex items-center gap-4 px-5 py-3.5 rounded-xl font-bold text-sm uppercase">
                <i class="fas fa-book-open w-6"></i> eDairy
            </a>
            <!-- Fee Management -->
            <a href="fees.html" class="w-full flex items-center gap-4 px-5 py-3.5 text-slate-300 hover:bg-white/5 rounded-xl transition font-semibold text-sm uppercase">
                <i class="fas fa-rupee-sign w-6"></i> Fee Management
            </a>
            <!-- Attendance -->
            <a href="attendance.html" class="flex items-center gap-4 px-5 py-3.5 text-slate-400 hover:bg-white/5 rounded-xl transition font-semibold text-sm uppercase">
                <i class="fas fa-calendar-check w-6"></i> Attendance
            </a>
        </nav>

        <div class="p-5 border-t border-white/10">
            <button onclick="logout()" class="flex items-center gap-4 w-full px-5 py-3.5 text-rose-400 hover:bg-rose-500/10 rounded-xl transition font-bold text-sm uppercase">
                <i class="fas fa-sign-out-alt w-6"></i> Exit Panel
            </button>
        </div>
    </aside>

    <main class="flex-1 w-full p-4 md:p-8 lg:p-10 overflow-x-hidden">
        <!-- Header with admin profile (matching dashboard style) -->
        <div class="glass-panel rounded-2xl md:rounded-3xl p-5 md:p-7 mb-6 md:mb-8 border border-white/5">
            <div class="flex flex-wrap items-center justify-between gap-4">
                <div class="flex items-center gap-4">
                    <button id="mobileMenuButton" class="lg:hidden bg-slate-800 p-3 rounded-xl text-[#f1c40f] text-xl">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div>
                        <h2 class="text-xl md:text-2xl font-black text-white tracking-tight">
                            <i class="fas fa-journal-whills text-[#f1c40f] mr-2"></i> eDairy
                        </h2>
                        <p class="text-slate-400 text-xs md:text-sm font-medium">Manage institutional announcements & daily logs</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 md:w-16 md:h-16 bg-slate-800 rounded-2xl flex items-center justify-center text-2xl md:text-3xl font-black text-[#f1c40f] border-2 border-[#f1c40f]/40 shadow-lg" id="adminInitial">?</div>
                    <div>
                        <h2 class="text-xl md:text-3xl font-black text-white tracking-tight" id="adminName">Authenticating...</h2>
                        <p class="text-slate-400 text-xs md:text-sm font-medium" id="adminEmail">Secure session</p>
                    </div>
                </div>
            </div>
            
            <!-- Quick Stats for eDairy -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mt-6">
                <div class="bg-slate-900/60 rounded-2xl p-4 border border-white/10">
                    <div class="flex items-center justify-between">
                        <div><p class="text-slate-400 text-[10px] font-black uppercase">Total Entries</p><p class="text-2xl font-black text-white mt-1" id="statTotalEntries">0</p></div>
                        <i class="fas fa-book text-3xl text-[#f1c40f]/40"></i>
                    </div>
                </div>
                <div class="bg-slate-900/60 rounded-2xl p-4 border border-white/10">
                    <div class="flex items-center justify-between">
                        <div><p class="text-slate-400 text-[10px] font-black uppercase">Last Updated</p><p class="text-sm font-bold text-white mt-1" id="statLastUpdate">—</p></div>
                        <i class="fas fa-clock text-3xl text-emerald-400/40"></i>
                    </div>
                </div>
                <div class="bg-slate-900/60 rounded-2xl p-4 border border-white/10">
                    <div class="flex items-center justify-between">
                        <div><p class="text-slate-400 text-[10px] font-black uppercase">Created By</p><p class="text-sm font-bold text-white mt-1" id="statAdminName">You</p></div>
                        <i class="fas fa-user-shield text-3xl text-[#f1c40f]/40"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Bar: Search & Add Entry -->
        <div class="flex flex-col sm:flex-row gap-4 justify-between items-stretch sm:items-center mb-6">
            <div class="relative w-full sm:w-80">
                <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                <input type="text" id="searchDiaryInput" placeholder="Search entries by title or content..." class="w-full bg-slate-800/60 border border-slate-700 rounded-2xl py-3 pl-12 pr-5 text-white focus:border-[#f1c40f] transition outline-none text-sm">
            </div>
            <button onclick="openAddModal()" class="bg-[#f1c40f] hover:bg-[#f1c40f]/90 text-slate-900 px-5 py-3 rounded-xl font-black text-xs uppercase transition-all flex items-center justify-center gap-2 shadow-lg">
                <i class="fas fa-plus-circle"></i> New Diary Entry
            </button>
        </div>

        <!-- Diary Entries Container -->
        <div id="entriesContainer" class="space-y-4">
            <div class="glass-panel rounded-2xl p-8 text-center">
                <div class="skeleton h-20 w-full rounded-xl"></div>
            </div>
        </div>
    </main>

    <!-- Add/Edit Diary Modal -->
    <div id="entryModal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md z-[150] flex items-center justify-center p-4 modal-backdrop">
        <div class="glass-panel w-full max-w-2xl rounded-3xl p-6 md:p-8 shadow-2xl border border-white/20 modal-card">
            <div class="flex justify-between items-start mb-5">
                <div>
                    <h3 class="text-2xl md:text-3xl font-black text-white" id="modalTitle">New Entry</h3>
                    <p class="text-slate-400 text-xs mt-1">Record daily updates, announcements, or notes</p>
                </div>
                <button onclick="closeModal()" class="text-slate-500 hover:text-white text-2xl"><i class="fas fa-times-circle"></i></button>
            </div>
            <form id="entryForm" class="space-y-5">
                <input type="hidden" id="entryId">
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Title</label>
                    <input type="text" id="entryTitle" class="w-full mt-1 px-5 py-3.5 bg-slate-900 border border-slate-700 rounded-xl text-white focus:border-[#f1c40f] outline-none transition" required placeholder="e.g., Holiday Announcement, Exam Schedule...">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Content / Notes</label>
                    <textarea id="entryContent" rows="6" class="w-full mt-1 px-5 py-3.5 bg-slate-900 border border-slate-700 rounded-xl text-white focus:border-[#f1c40f] outline-none transition resize-none" required placeholder="Write your diary entry here..."></textarea>
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="submit" class="flex-1 py-3.5 bg-emerald-500 text-slate-900 font-black uppercase rounded-xl hover:bg-emerald-400 transition-all shadow-md text-sm">
                        <i class="fas fa-save mr-2"></i> Save Entry
                    </button>
                    <button type="button" onclick="closeModal()" class="flex-1 py-3.5 bg-slate-700 text-white font-bold rounded-xl hover:bg-slate-600 transition text-sm">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Toast Notification (Stylish) -->
    <div id="toastMessage" class="fixed bottom-6 right-6 bg-slate-800/95 backdrop-blur-md border-l-4 border-rose-500 text-white px-5 py-3 rounded-xl shadow-2xl z-[200] hidden transition-all duration-300 text-sm font-medium"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, query, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCny3ldh6tjeGLVQPgDQEHfDSFP--c6Hj4",
            authDomain: "trfasilyousf1.firebaseapp.com",
            projectId: "trfasilyousf1",
            storageBucket: "trfasilyousf1.firebasestorage.app",
            messagingSenderId: "158147210589",
            appId: "1:158147210589:web:1cfed2fc691fa4a13a0cb4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentAdminUser = null;
        let currentAdminData = null;
        let allEntries = []; // store for search/filter

        // Helper: Escape HTML to prevent injection
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }

        // Show temporary toast notification
        function showToast(message, isError = false) {
            const toast = document.getElementById('toastMessage');
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'} mr-2"></i> ${message}`;
            toast.classList.remove('hidden');
            toast.style.borderLeftColor = isError ? '#ef4444' : '#10b981';
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        // Update stats (total entries, last update info)
        function updateStats(entriesArray) {
            const total = entriesArray.length;
            document.getElementById('statTotalEntries').innerText = total;
            if (entriesArray.length > 0) {
                const latest = entriesArray.sort((a,b) => {
                    const dateA = a.createdAt ? new Date(a.createdAt.toDate()) : new Date(0);
                    const dateB = b.createdAt ? new Date(b.createdAt.toDate()) : new Date(0);
                    return dateB - dateA;
                })[0];
                if (latest && latest.createdAt) {
                    const lastDate = new Date(latest.createdAt.toDate()).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
                    document.getElementById('statLastUpdate').innerHTML = `${lastDate}`;
                } else {
                    document.getElementById('statLastUpdate').innerHTML = '—';
                }
            } else {
                document.getElementById('statLastUpdate').innerHTML = 'No entries';
            }
            if (currentAdminData && currentAdminData.fullName) {
                document.getElementById('statAdminName').innerHTML = currentAdminData.fullName.split(' ')[0];
            }
        }

        // Render diary entries with optional search filter
        function renderEntries(entries) {
            const container = document.getElementById('entriesContainer');
            if (!entries.length) {
                container.innerHTML = `
                    <div class="glass-panel rounded-2xl p-12 text-center border border-white/10">
                        <i class="fas fa-journal-whills text-6xl mb-4 opacity-30 text-[#f1c40f]"></i>
                        <p class="text-slate-400 font-medium">No diary entries found.</p>
                        <button onclick="openAddModal()" class="mt-4 text-[#f1c40f] bg-[#f1c40f]/10 px-5 py-2 rounded-xl text-sm font-bold hover:bg-[#f1c40f] hover:text-slate-900 transition">+ Create your first entry</button>
                    </div>
                `;
                updateStats([]);
                return;
            }
            
            let html = '';
            entries.forEach(entry => {
                const dateObj = entry.createdAt ? entry.createdAt.toDate() : new Date(entry.updatedAt || Date.now());
                const formattedDate = dateObj.toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: 'numeric' });
                const formattedTime = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const isEdited = entry.updatedAt && entry.createdAt && entry.updatedAt.toDate().getTime() !== entry.createdAt.toDate().getTime();
                
                html += `
                    <div class="glass-panel rounded-2xl p-5 diary-card border border-white/10 transition-all">
                        <div class="flex justify-between items-start flex-wrap gap-3">
                            <div class="flex-1">
                                <div class="flex items-center gap-2 flex-wrap">
                                    <h3 class="text-lg md:text-xl font-bold text-white">${escapeHtml(entry.title)}</h3>
                                    ${isEdited ? '<span class="text-[9px] bg-slate-700 px-2 py-0.5 rounded-full text-slate-300">edited</span>' : ''}
                                </div>
                                <div class="flex items-center gap-3 mt-1.5 text-[10px] text-slate-400">
                                    <span><i class="far fa-calendar-alt mr-1"></i> ${formattedDate} at ${formattedTime}</span>
                                    ${entry.createdBy ? `<span><i class="fas fa-user-shield mr-1"></i> Admin</span>` : ''}
                                </div>
                                <div class="mt-4 text-slate-300 text-sm md:text-base leading-relaxed whitespace-pre-wrap border-l-2 border-[#f1c40f]/30 pl-4">
                                    ${escapeHtml(entry.content)}
                                </div>
                            </div>
                            <div class="flex gap-2 ml-auto">
                                <button onclick="editEntry('${entry.id}', '${escapeHtml(entry.title)}', '${escapeHtml(entry.content)}')" 
                                    class="text-blue-400 bg-blue-400/10 p-2.5 rounded-xl hover:bg-blue-400 hover:text-white transition shadow-md" title="Edit">
                                    <i class="fas fa-edit text-sm"></i>
                                </button>
                                <button onclick="deleteEntry('${entry.id}')" 
                                    class="text-rose-400 bg-rose-400/10 p-2.5 rounded-xl hover:bg-rose-500 hover:text-white transition shadow-md" title="Delete">
                                    <i class="fas fa-trash-alt text-sm"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            updateStats(entries);
        }

        // Load entries from Firestore and apply search if any
        async function loadEntries(searchTerm = '') {
            const container = document.getElementById('entriesContainer');
            container.innerHTML = '<div class="glass-panel rounded-2xl p-8 text-center"><div class="skeleton h-20 w-full rounded-xl"></div></div>';
            
            try {
                const q = query(collection(db, "edairy"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                allEntries = [];
                snap.forEach(docSnap => {
                    allEntries.push({ id: docSnap.id, ...docSnap.data() });
                });
                
                // Apply search filter
                let filtered = allEntries;
                if (searchTerm.trim() !== '') {
                    const term = searchTerm.toLowerCase();
                    filtered = allEntries.filter(entry => 
                        entry.title?.toLowerCase().includes(term) || 
                        entry.content?.toLowerCase().includes(term)
                    );
                }
                renderEntries(filtered);
            } catch (err) {
                console.error("Load error:", err);
                container.innerHTML = '<div class="glass-panel rounded-2xl p-8 text-center text-rose-400"><i class="fas fa-exclamation-triangle mr-2"></i> Failed to load entries. <button onclick="refreshDiary()" class="underline">Retry</button></div>';
            }
        }

        // Refresh function for retry
        window.refreshDiary = () => {
            const searchVal = document.getElementById('searchDiaryInput')?.value || '';
            loadEntries(searchVal);
        };

        // Modal handlers
        window.openAddModal = () => {
            document.getElementById('modalTitle').innerText = 'New Entry';
            document.getElementById('entryId').value = '';
            document.getElementById('entryTitle').value = '';
            document.getElementById('entryContent').value = '';
            document.getElementById('entryModal').classList.remove('hidden');
        };
        
        window.editEntry = (id, title, content) => {
            document.getElementById('modalTitle').innerText = 'Edit Entry';
            document.getElementById('entryId').value = id;
            document.getElementById('entryTitle').value = title;
            document.getElementById('entryContent').value = content;
            document.getElementById('entryModal').classList.remove('hidden');
        };
        
        window.closeModal = () => {
            document.getElementById('entryModal').classList.add('hidden');
        };
        
        // Delete entry with confirmation and toast
        window.deleteEntry = async (id) => {
            if (confirm("⚠️ Permanently delete this diary entry? This action cannot be undone.")) {
                try {
                    await deleteDoc(doc(db, "edairy", id));
                    showToast("Entry deleted successfully", false);
                    const searchVal = document.getElementById('searchDiaryInput')?.value || '';
                    await loadEntries(searchVal);
                } catch (err) {
                    showToast("Delete failed: " + err.message, true);
                }
            }
        };
        
        // Submit form (add / update)
        document.getElementById('entryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('entryId').value;
            const title = document.getElementById('entryTitle').value.trim();
            const content = document.getElementById('entryContent').value.trim();
            
            if (!title || !content) {
                showToast("Title and content are required", true);
                return;
            }
            
            const now = new Date();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Saving...';
            
            try {
                if (id) {
                    // Update existing entry
                    await updateDoc(doc(db, "edairy", id), { 
                        title, 
                        content, 
                        updatedAt: now,
                        lastModifiedBy: currentAdminUser?.uid 
                    });
                    showToast("Entry updated successfully", false);
                } else {
                    // Create new entry
                    await addDoc(collection(db, "edairy"), { 
                        title, 
                        content, 
                        createdAt: now,
                        updatedAt: now,
                        createdBy: currentAdminUser?.uid,
                        authorName: currentAdminData?.fullName || "Admin"
                    });
                    showToast("New entry published!", false);
                }
                closeModal();
                const searchVal = document.getElementById('searchDiaryInput')?.value || '';
                await loadEntries(searchVal);
            } catch (err) {
                console.error(err);
                showToast("Error: " + err.message, true);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });
        
        // Logout function
        window.logout = async () => {
            await signOut(auth);
            window.location.href = "../index.html";
        };
        
        // Search input listener
        document.getElementById('searchDiaryInput').addEventListener('input', (e) => {
            const term = e.target.value;
            if (allEntries.length > 0) {
                const filtered = allEntries.filter(entry => 
                    entry.title?.toLowerCase().includes(term.toLowerCase()) || 
                    entry.content?.toLowerCase().includes(term.toLowerCase())
                );
                renderEntries(filtered);
            } else {
                loadEntries(term);
            }
        });
        
        // Mobile sidebar logic (consistent with main dashboard)
        document.getElementById('mobileMenuButton').onclick = () => {
            document.getElementById('mainSidebar').classList.remove('-translate-x-full');
            document.getElementById('mobileSidebarOverlay').classList.remove('hidden');
        };
        document.getElementById('mobileSidebarOverlay').onclick = () => {
            document.getElementById('mainSidebar').classList.add('-translate-x-full');
            document.getElementById('mobileSidebarOverlay').classList.add('hidden');
        };
        
        // Handle window resize for sidebar
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 1024) {
                document.getElementById('mainSidebar').classList.remove('-translate-x-full');
                document.getElementById('mobileSidebarOverlay').classList.add('hidden');
            }
        });
        
        // Authentication & Admin verification
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists() && userDoc.data().role === 'admin') {
                    currentAdminUser = user;
                    currentAdminData = userDoc.data();
                    // Populate header with admin info
                    const fullName = currentAdminData.fullName || "Administrator";
                    const email = user.email || currentAdminData.email;
                    document.getElementById('adminName').innerText = "Salam, " + fullName;
                    document.getElementById('adminEmail').innerText = email;
                    const initial = fullName.charAt(0).toUpperCase();
                    document.getElementById('adminInitial').innerText = initial;
                    document.getElementById('statAdminName').innerHTML = fullName.split(' ')[0];
                    // Load diary entries
                    await loadEntries('');
                } else {
                    await signOut(auth);
                    window.location.href = "../auth/login.html";
                }
            } else {
                window.location.href = "../auth/login.html";
            }
        });
    </script>
</body>
</html>
