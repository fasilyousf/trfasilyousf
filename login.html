<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Tr Fasil Yousf</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .bg-animate {
            background: linear-gradient(-45deg, #2c3e50, #3498db, #2c3e50, #f1c40f);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .input-focus:focus {
            border-color: #f1c40f;
            box-shadow: 0 0 0 4px rgba(241, 196, 15, 0.1);
        }
        .loader {
            border-top-color: #f1c40f;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-animate min-h-screen flex items-center justify-center p-6">

    <a href="index.html" class="absolute top-8 left-8 text-white/80 hover:text-white flex items-center gap-2 font-semibold transition">
        <i class="fas fa-arrow-left"></i> Back to Home
    </a>

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex w-16 h-16 bg-[#f1c40f] rounded-2xl items-center justify-center shadow-xl mb-4 transform -rotate-6">
                <i class="fas fa-user-graduate text-[#2c3e50] text-3xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-white tracking-tight">Welcome <span class="text-[#f1c40f]">Back</span></h1>
            <p class="text-white/60 text-sm mt-2">Login to access your courses and notes</p>
        </div>

        <div class="glass-container rounded-[2.5rem] p-10 shadow-2xl">
            <form id="loginForm" class="space-y-6">
                
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Email Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" id="loginEmail" placeholder="example@gmail.com" required
                            class="w-full pl-11 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none input-focus transition-all text-slate-700">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between mb-2 ml-1">
                        <label class="text-sm font-bold text-slate-700">Password</label>
                        <a href="#" id="forgotPass" class="text-xs font-semibold text-[#3498db] hover:text-[#2c3e50]">Forgot?</a>
                    </div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="loginPass" placeholder="••••••••" required
                            class="w-full pl-11 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none input-focus transition-all text-slate-700">
                    </div>
                </div>

                <div class="flex items-center gap-2 ml-1">
                    <input type="checkbox" id="remember" class="w-4 h-4 rounded border-slate-300 text-[#f1c40f] focus:ring-[#f1c40f]">
                    <label for="remember" class="text-sm font-medium text-slate-600">Remember me</label>
                </div>

                <button type="submit" id="loginBtn"
                    class="w-full py-4 bg-[#2c3e50] text-white font-bold rounded-2xl shadow-xl hover:bg-[#1a252f] transform active:scale-95 transition-all flex items-center justify-center gap-2 uppercase tracking-widest">
                    <span id="btnText">Sign In</span>
                    <i class="fas fa-sign-in-alt" id="btnIcon"></i>
                    <div id="btnLoader" class="loader hidden ease-linear rounded-full border-2 border-t-2 border-gray-200 h-5 w-5"></div>
                </button>
            </form>

            <div class="mt-8">
                <div class="relative flex items-center justify-center mb-6">
                    <div class="flex-grow border-t border-slate-200"></div>
                    <span class="flex-shrink mx-4 text-slate-400 text-xs font-bold uppercase tracking-widest">Or login with</span>
                    <div class="flex-grow border-t border-slate-200"></div>
                </div>
                <div class="flex gap-4">
                    <button onclick="socialLogin('Google')" class="flex-1 py-3 border border-slate-200 rounded-xl flex items-center justify-center gap-2 hover:bg-slate-50 transition font-semibold text-sm">
                        <i class="fab fa-google text-red-500"></i> Google
                    </button>
                    <button onclick="socialLogin('Facebook')" class="flex-1 py-3 border border-slate-200 rounded-xl flex items-center justify-center gap-2 hover:bg-slate-50 transition font-semibold text-sm">
                        <i class="fab fa-facebook text-blue-600"></i> Facebook
                    </button>
                </div>
            </div>

            <div class="mt-10 text-center">
                <p class="text-slate-500 font-medium text-sm">
                    New student? 
                    <a href="register.html" class="text-[#f1c40f] font-extrabold hover:underline ml-1 uppercase">Register Now</a>
                </p>
            </div>
        </div>

        <p class="text-center text-white/40 text-[10px] mt-8 font-bold uppercase tracking-[0.3em]">
            © 2026 UCC Handwara | Secured by Tr Fasil Yousf
        </p>
    </div>

    <script type="module">
        // Import Firebase modules
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCny3ldh6tjeGLVQPgDQEHfDSFP--c6Hj4",
            authDomain: "trfasilyousf1.firebaseapp.com",
            projectId: "trfasilyousf1",
            storageBucket: "trfasilyousf1.firebasestorage.app",
            messagingSenderId: "158147210589",
            appId: "1:158147210589:web:1cfed2fc691fa4a13a0cb4",
            measurementId: "G-JJ5GE7HS02"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const btnLoader = document.getElementById('btnLoader');

        // Login Handler
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;

            // Start Loading
            loginBtn.disabled = true;
            btnText.innerText = "Verifying...";
            btnIcon.classList.add('hidden');
            btnLoader.classList.remove('hidden');

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                console.log("Logged in:", userCredential.user);
                window.location.href = "dashboard.html"; // Your dashboard page
            } catch (error) {
                console.error("Login Error:", error.code);
                let message = "An error occurred during login.";
                if (error.code === 'auth/invalid-credential') message = "Invalid email or password.";
                if (error.code === 'auth/user-not-found') message = "No user found with this email.";
                alert(message);
            } finally {
                // Stop Loading
                loginBtn.disabled = false;
                btnText.innerText = "Sign In";
                btnIcon.classList.remove('hidden');
                btnLoader.classList.add('hidden');
            }
        });

        // Forgot Password Handler
        document.getElementById('forgotPass').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            if (!email) {
                alert("Please enter your email address first.");
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                alert("Password reset link sent to your email.");
            } catch (error) {
                alert("Error: " + error.message);
            }
        });

        // Placeholder for Social Logins
        window.socialLogin = (provider) => {
            alert(provider + " login requires additional configuration in Firebase Console.");
        };
    </script>
</body>
</html>
